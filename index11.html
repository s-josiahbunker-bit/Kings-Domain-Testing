<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING'S DOMAIN | SHADOW V80</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p5-pink-red: #ff1f44; --p5-black: #000000; --p5-card-bg: #141414; }
        html, body { margin: 0; padding: 0; height: 100%; background-color: var(--p5-black); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .v-nav { position: fixed; left: 0; top: 0; height: 100%; width: 85px; background: #000; border-right: 2px solid var(--p5-pink-red); display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 20px; z-index: 1000; }
        .nav-btn { width: 65px; height: 65px; background: #222; cursor: pointer; transition: 0.3s; }
        #sidebar { position: fixed; top: 0; left: -320px; width: 310px; height: 100%; background: #111; border-right: 4px solid var(--p5-pink-red); z-index: 2001; transition: 0.5s ease; padding: 50px 20px; }
        #sidebar.active { left: 0; }
        .sidebar-item { cursor: pointer; padding: 18px; color: white; text-transform: uppercase; font-weight: 900; }
        .sidebar-item:hover { color: var(--p5-pink-red); }
        .workspace { margin-left: 85px; height: calc(100% - 60px); width: calc(100% - 85px); overflow-y: auto; padding: 40px 60px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: var(--p5-card-bg); border-radius: 12px; height: 380px; position: relative; overflow: hidden; border: 1px solid #1a1a1a; cursor: pointer; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card p { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); margin: 0; padding: 12px 0; text-align: center; font-size: 11px; font-weight: 700; border-top: 1px solid var(--p5-pink-red); }
        #player-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 10000; }
        .api-modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 99999; }
        .api-modal-box { background: #111; padding: 50px; border: 2px solid var(--p5-pink-red); text-align: center; max-width: 500px; }
    </style>
</head>
<body>

    <nav class="v-nav"><div class="nav-btn" onclick="toggleSidebar()"></div></nav>
    <div id="sidebar" onmouseleave="closeSidebar()">
        <div class="sidebar-item" onclick="changeHub('arcade')">Arcade</div>
        <div class="sidebar-item" onclick="changeHub('movie')">Movies</div>
        <div class="sidebar-item" onclick="changeHub('tv')">Shows</div>
    </div>

    <div class="workspace">
        <input type="text" id="searchBox" placeholder="Search mission database..." onkeydown="if(event.key==='Enter') searchGlobal()">
        <div class="grid" id="mainGrid"></div>
    </div>

    <div id="player-view">
        <button onclick="closePlayer()">BACK</button>
        <iframe id="gameFrame" src="" style="width:100%; height:80%; border:none;"></iframe>
        <div id="epSidebar">
            <button id="btn-sub" class="sd-btn" onclick="setLang('sub')">Sub</button>
            <button id="btn-dub" class="sd-btn" onclick="setLang('dub')">Dub</button>
            <select id="seasonSelect" onchange="handleSeasonChange()"></select>
            <div id="epGrid"></div>
            <div id="serverHub"></div>
        </div>
    </div>

    <div class="api-modal-overlay" id="apiModal" style="display:none;">
        <div class="api-modal-box">
            <h2>TMDB API KEY REQUIRED</h2>
            <input type="text" id="apiKeyInput">
            <button onclick="saveApiKey()">ACTIVATE SYSTEM</button>
        </div>
    </div>

    <script>
        let TMDB_KEY = localStorage.getItem('tmdb_api_key') || '';
        let mission = { id:"", type:"movie", season:1, episode:1, lang: localStorage.getItem('p5_pref_lang') || "sub", provider:"node1" };
        const games = [{ name: "Slime Rancher", img: "https://sm.ign.com/ign_es/cover/s/slime-ranc/slime-rancher_j318.jpg", url: "slimerancher.html", isArcade: true }, { name: "Helltaker", img: "https://files.catbox.moe/k9d5o6.png", url: "helltaker.html", isArcade: true }];

        const SERVER_NODES = {
            node1: { name: "Node Alpha", buildUrl: (t, id, s, e, l) => t === 'movie' ? `https://111movies.net/movie/${id}` : `https://111movies.net/tv/${id}/${s}/${e}?lang=${l}` },
            node2: { name: "Node Beta", buildUrl: (t, id, s, e, l) => t === 'movie' ? `https://multiembed.mov/?video_id=${id}&tmdb=1` : `https://multiembed.mov/?video_id=${id}&tmdb=1&s=${s}&e=${e}&lang=${l === 'dub' ? '1' : '0'}` }
        };

        function saveApiKey() { TMDB_KEY = document.getElementById('apiKeyInput').value; localStorage.setItem('tmdb_api_key', TMDB_KEY); document.getElementById('apiModal').style.display = 'none'; }
        
        async function searchGlobal() {
            const query = document.getElementById('searchBox').value.trim();
            if (!query) return;
            let allResults = [];
            for(let i = 1; i <= 10; i++) {
                const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}&page=${i}`).then(r => r.json());
                if(res.results) allResults = allResults.concat(res.results);
                if(i >= res.total_pages) break;
            }
            render(allResults.filter(i => i.poster_path).map(i => ({id:i.id, name:i.title||i.name, img:`https://image.tmdb.org/t/p/w500${i.poster_path}`, type:i.media_type})), false);
        }

        function render(data, isLoadMore) {
            const grid = document.getElementById('mainGrid');
            if(!isLoadMore) grid.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${item.img}"><p>${item.name}</p>`;
                card.onclick = () => item.isArcade ? launchArcade(item) : launchTITAN(item);
                grid.appendChild(card);
            });
        }

        function launchTITAN(item) {
            mission.id = item.id; mission.type = item.type === 'movie' ? 'movie' : 'tv';
            document.getElementById('player-view').style.display = 'flex';
            refreshTITAN();
        }

        function refreshTITAN() {
            const node = SERVER_NODES[mission.provider];
            document.getElementById('gameFrame').src = node.buildUrl(mission.type, mission.id, mission.season, mission.episode, mission.lang);
        }

        function setLang(lang) { mission.lang = lang; localStorage.setItem('p5_pref_lang', lang); refreshTITAN(); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('active'); }
        function closePlayer() { document.getElementById('player-view').style.display = 'none'; }

        if(!TMDB_KEY) document.getElementById('apiModal').style.display = 'flex';
        render(games, false);
    </script>
</body>
</html>
