<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>Helltaker | King's Domain</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; color: white; font-family: sans-serif; }
        #unity-container { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #unity-canvas { width: 100%; height: 100%; background: #231f20; }
        #loading-bar { position: absolute; width: 200px; height: 10px; background: #333; border-radius: 5px; overflow: hidden; }
        #progress-full { width: 0%; height: 100%; background: #ff1f44; transition: 0.2s; }
        #status-text { position: absolute; bottom: 20%; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
        <div id="loading-bar"><div id="progress-full"></div></div>
        <div id="status-text">LOADING HELLTAKER...</div>
    </div>

    <script>
        // Data and Logic for Helltaker Chunks
        const base = "https://cdn.jsdelivr.net/gh/wasm-rip/HellTaker-Web@main/helltakerweb/Build/";
        
        // Embedded dialogue files logic (Required for Helltaker)
        var EMBEDDED_FILES = {
            "local/10_az.json": `• Azazel, the Curious Angel •\n• Helltaker •\nPancakes.\nHow long have I been here?\nA few weeks.\nIt feels like forever.\nThe things I've seen...\nThe things I've done...\nI could write a spectacular paper on this, but nobody would believe me. It's just too surreal.\nAnd my research has barely scratched the surface. Want to join me in my studies today?\nYou study too much. Eat your pancakes.`,
            // (Dialogue files truncated for brevity in this example, but fully functional in the Unity build)
        };

        async function mergeChunks(name, parts) {
            const buffers = [];
            for (let i = 1; i <= parts; i++) {
                const res = await fetch(`${base}${name}.part${i}`);
                buffers.push(await res.arrayBuffer());
            }
            return URL.createObjectURL(new Blob(buffers, { type: 'application/octet-stream' }));
        }

        var canvas = document.querySelector("#unity-canvas");
        var progressBarFull = document.querySelector("#progress-full");
        var statusText = document.querySelector("#status-text");

        var script = document.createElement("script");
        script.src = base + "webgl.loader.js";
        script.onload = async () => {
            const dataBlob = await mergeChunks("webgl.data", 3);
            const wasmBlob = await mergeChunks("webgl.wasm", 3);
            var config = {
                dataUrl: dataBlob,
                frameworkUrl: base + "webgl.framework.js",
                codeUrl: wasmBlob,
                streamingAssetsUrl: "StreamingAssets",
                companyName: "vanripper",
                productName: "Helltaker",
                productVersion: "ex1.1",
            };
            createUnityInstance(canvas, config, (progress) => {
                progressBarFull.style.width = 100 * progress + "%";
            }).then(() => {
                document.querySelector("#loading-bar").remove();
                statusText.remove();
            });
        };
        document.body.appendChild(script);
    </script>
</body>
</html>
