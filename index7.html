<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING'S DOMAIN | SHADOW V80</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- YOUR ORIGINAL CSS GOES HERE -->
    <style>
        :root { --p5-pink-red: #ff1f44; --p5-black: #000000; --p5-card-bg: #141414; }
        body { margin:0; background:var(--p5-black); color:white; font-family:'Inter', sans-serif; overflow:hidden; }
        .v-nav { position:fixed; left:0; top:0; width:85px; height:100%; border-right:2px solid var(--p5-pink-red); background:#000; z-index:1000; }
        .workspace { margin-left:85px; height:100vh; overflow-y:auto; padding:40px; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:20px; }
        .card { background:#141414; height:380px; cursor:pointer; border:1px solid #1a1a1a; }
        .card img { width:100%; height:85%; object-fit:cover; }
        .sd-btn { padding:10px; background:#222; color:white; border:none; cursor:pointer; }
        .sd-btn.active { background:var(--p5-pink-red); }
        #player-view { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:9999; flex-direction:column; }
    </style>
</head>
<body>
    <nav class="v-nav">
        <div onclick="changeHub('arcade')" style="padding:20px; cursor:pointer;">Arcade</div>
        <div onclick="changeHub('movie')" style="padding:20px; cursor:pointer;">Movies</div>
        <div onclick="changeHub('tv')" style="padding:20px; cursor:pointer;">Shows</div>
    </nav>
    <div class="workspace"><div class="grid" id="mainGrid"></div></div>

    <div id="player-view">
        <div class="player-bar" style="padding:20px;">
            <button onclick="closePlayer()">BACK</button>
            <button id="btn-sub" class="sd-btn active" onclick="setLang('sub')">SUB</button>
            <button id="btn-dub" class="sd-btn" onclick="setLang('dub')">DUB</button>
        </div>
        <iframe id="gameFrame" src="" style="width:100%; height:80vh; border:none;"></iframe>
    </div>

    <script>
        let TMDB_KEY = localStorage.getItem('tmdb_api_key') || prompt("Enter TMDB API Key:");
        if(TMDB_KEY) localStorage.setItem('tmdb_api_key', TMDB_KEY);

        let mission = { id:"", type:"movie", lang:"sub", season:1, episode:1 };

        const games = [
            { name: "Slime Rancher", img: "https://sm.ign.com/ign_es/cover/s/slime-ranc/slime-rancher_j318.jpg", url: "slimerancher.html", isArcade: true },
            { name: "Helltaker", img: "https://files.catbox.moe/k9d5o6.png", url: "helltaker.html", isArcade: true }
        ];

        function render(items) {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            items.forEach(i => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${i.img}"><p>${i.name}</p>`;
                card.onclick = () => launch(i);
                grid.appendChild(card);
            });
        }

        async function changeHub(mode) {
            if(mode === 'arcade') {
                render(games.map(g => ({name:g.name, img:g.img, url:g.url, isArcade:true})));
            } else {
                const res = await fetch(`https://api.themoviedb.org/3/discover/${mode}?api_key=${TMDB_KEY}`);
                const data = await res.json();
                render(data.results.map(i => ({id:i.id, name:i.title||i.name, img:'https://image.tmdb.org/t/p/w500'+i.poster_path, type:mode})));
            }
        }

        function launch(item) {
            document.getElementById('player-view').style.display = 'flex';
            if(item.isArcade) {
                document.getElementById('gameFrame').src = item.url;
            } else {
                mission.id = item.id;
                mission.type = item.type;
                refreshTITAN();
            }
        }

        function refreshTITAN() {
            // Updated logic for 111Movies/MultiEmbed with Language Toggle
            const l = mission.lang === 'dub' ? '&audio=eng' : '&audio=jpn';
            const url = mission.type === 'movie' 
                ? `https://multiembed.mov/?video_id=${mission.id}&tmdb=1${l}`
                : `https://multiembed.mov/?video_id=${mission.id}&tmdb=1&s=1&e=1${l}`;
            document.getElementById('gameFrame').src = url;
        }

        function setLang(lang) {
            mission.lang = lang;
            document.getElementById('btn-sub').classList.toggle('active', lang === 'sub');
            document.getElementById('btn-dub').classList.toggle('active', lang === 'dub');
            refreshTITAN();
        }

        function closePlayer() { document.getElementById('player-view').style.display = 'none'; }
        
        changeHub('movie');
    </script>
</body>
</html>
