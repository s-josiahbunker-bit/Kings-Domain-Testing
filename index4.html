<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING'S DOMAIN | SHADOW V80</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --p5-pink-red: #ff1f44; --p5-black: #000000; --p5-card-bg: #141414; }
        html, body { margin: 0; padding: 0; height: 100%; background: var(--p5-black); color: white; font-family: 'Inter', sans-serif; }
        .v-nav { position: fixed; left: 0; top: 0; height: 100%; width: 85px; background: #000; border-right: 2px solid var(--p5-pink-red); display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 1000; }
        .workspace { margin-left: 85px; padding: 40px; height: 100vh; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: var(--p5-card-bg); border-radius: 12px; height: 380px; cursor: pointer; border: 1px solid #1a1a1a; transition: 0.3s; overflow: hidden; }
        .card:hover { border-color: var(--p5-pink-red); transform: translateY(-5px); }
        .card img { width: 100%; height: 85%; object-fit: cover; }
        .card p { text-align: center; font-size: 11px; padding: 10px; margin: 0; }
        #player-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; flex-direction: column; }
        .player-bar { padding: 20px; display: flex; gap: 20px; align-items: center; }
        #gameFrame { flex: 1; border: none; }
        .api-modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:flex; justify-content:center; align-items:center; z-index:99999; }
        .api-box { background:#111; padding:40px; border:2px solid var(--p5-pink-red); text-align:center; }
        input { padding: 10px; width: 300px; background: #222; border: 1px solid #444; color: white; }
        button { background: var(--p5-pink-red); color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        .active { border: 2px solid white; }
    </style>
</head>
<body>
    <nav class="v-nav">
        <div onclick="location.reload()" style="cursor:pointer; padding:10px;"><i class="fas fa-home"></i></div>
    </nav>
    <div class="workspace">
        <div class="grid" id="mainGrid"></div>
    </div>

    <div id="player-view">
        <div class="player-bar">
            <button onclick="closePlayer()">BACK</button>
            <button onclick="setLang('sub')" id="btn-sub">SUB</button>
            <button onclick="setLang('dub')" id="btn-dub">DUB</button>
        </div>
        <iframe id="gameFrame" src=""></iframe>
    </div>

    <div class="api-modal" id="apiModal" style="display:none;">
        <div class="api-box">
            <h2>ENTER TMDB API KEY</h2>
            <input type="text" id="apiKeyInput" placeholder="Paste Key Here...">
            <button onclick="saveKey()">ACTIVATE</button>
        </div>
    </div>

    <script>
        let TMDB_KEY = localStorage.getItem('tmdb_api_key') || '';
        let mission = { id: "", type: "movie", lang: "sub", isGame: false };
        
        const games = [
            { name: "Slime Rancher", img: "https://sm.ign.com/ign_es/cover/s/slime-ranc/slime-rancher_j318.jpg", url: "slimerancher.html", isGame: true },
            { name: "Helltaker", img: "https://files.catbox.moe/k9d5o6.png", url: "helltaker.html", isGame: true },
            { name: "Slope", img: "https://sm.ign.com/ign_br/game/s/slope/slope_69qy.jpg", url: "https://kkgames.github.io/slope/", isGame: true }
        ];

        function saveKey() {
            TMDB_KEY = document.getElementById('apiKeyInput').value;
            localStorage.setItem('tmdb_api_key', TMDB_KEY);
            document.getElementById('apiModal').style.display = 'none';
            renderContent();
        }

        async function renderContent() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            
            // Add Games
            games.forEach(g => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${g.img}"><p>${g.name}</p>`;
                card.onclick = () => { mission.isGame = true; mission.url = g.url; openPlayer(); };
                grid.appendChild(card);
            });

            // Add Movies
            if(TMDB_KEY) {
                const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_KEY}&sort_by=popularity.desc`);
                const data = await res.json();
                data.results.forEach(i => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${i.poster_path}"><p>${i.title}</p>`;
                    card.onclick = () => { mission.isGame = false; mission.id = i.id; openPlayer(); };
                    grid.appendChild(card);
                });
            }
        }

        function openPlayer() {
            document.getElementById('player-view').style.display = 'flex';
            const f = document.getElementById('gameFrame');
            if(mission.isGame) {
                f.src = mission.url;
            } else {
                const l = mission.lang === 'dub' ? '&dub=1' : '&sub=1';
                f.src = `https://vidsrc.xyz/embed/movie/${mission.id}${l}`;
            }
        }

        function setLang(l) { mission.lang = l; openPlayer(); }
        function closePlayer() { document.getElementById('player-view').style.display = 'none'; }

        if(!TMDB_KEY) document.getElementById('apiModal').style.display = 'flex';
        renderContent();
    </script>
</body>
</html>
