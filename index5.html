<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KING'S DOMAIN | SHADOW V81</title>
    <!-- [Keep your original CSS here, I have abbreviated for length, use your original styles] -->
    <style>
        :root { --p5-pink-red: #ff1f44; --p5-black: #000000; --p5-card-bg: #141414; }
        body { margin:0; background:var(--p5-black); color:white; font-family:sans-serif; }
        .v-nav { position:fixed; left:0; top:0; width:85px; height:100%; border-right:2px solid var(--p5-pink-red); background:#000; }
        .workspace { margin-left:85px; padding:40px; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:20px; }
        .card { background:var(--p5-card-bg); height:380px; cursor:pointer; border:1px solid #1a1a1a; }
        .card img { width:100%; height:85%; object-fit:cover; }
        #player-view { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:9999; }
        .ep-sidebar { width:300px; background:#111; padding:20px; }
        .sd-btn { padding:10px; background:#222; color:white; cursor:pointer; border:none; }
        .sd-btn.active { background:var(--p5-pink-red); }
    </style>
</head>
<body>
    <nav class="v-nav">
        <div onclick="changeHub('arcade')">Arcade</div>
        <div onclick="changeHub('movie')">Movies</div>
        <div onclick="changeHub('tv')">Shows</div>
        <div onclick="changeHub('anime')">Anime</div>
    </nav>

    <div class="workspace">
        <div class="grid" id="mainGrid"></div>
    </div>

    <div id="player-view">
        <button onclick="closePlayer()">BACK</button>
        <div class="ep-sidebar">
            <button id="btn-sub" class="sd-btn" onclick="setLang('sub')">SUB</button>
            <button id="btn-dub" class="sd-btn" onclick="setLang('dub')">DUB</button>
        </div>
        <iframe id="gameFrame" src=""></iframe>
    </div>

    <script>
        let TMDB_KEY = localStorage.getItem('tmdb_api_key') || "";
        let mission = { id:"", type:"movie", lang:"sub", season:1, episode:1, provider:"node1" };

        const SERVER_NODES = {
            node1: {
                buildUrl: (type, id, s, e, lang) => {
                    // Logic: Append &sub=1 or &dub=1 to the URL
                    const l = lang === 'dub' ? '&dub=1' : '&sub=1';
                    return type === 'movie' ? `https://vidsrc.xyz/embed/movie/${id}${l}` : `https://vidsrc.xyz/embed/tv/${id}/${s}/${e}${l}`;
                }
            }
        };

        async function changeHub(mode) {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            if(mode === 'arcade') {
                // Add your hardcoded game objects here
            } else {
                const res = await fetch(`https://api.themoviedb.org/3/discover/${mode === 'movie' ? 'movie' : 'tv'}?api_key=${TMDB_KEY}`);
                const data = await res.json();
                data.results.forEach(i => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${i.poster_path}"><p>${i.title || i.name}</p>`;
                    card.onclick = () => launchTITAN(i.id, mode === 'movie' ? 'movie' : 'tv');
                    grid.appendChild(card);
                });
            }
        }

        function launchTITAN(id, type) {
            mission.id = id;
            mission.type = type;
            document.getElementById('player-view').style.display = 'flex';
            refreshTITAN();
        }

        function refreshTITAN() {
            const node = SERVER_NODES[mission.provider];
            document.getElementById('gameFrame').src = node.buildUrl(mission.type, mission.id, mission.season, mission.episode, mission.lang);
        }

        function setLang(l) {
            mission.lang = l;
            document.getElementById('btn-sub').className = l === 'sub' ? 'sd-btn active' : 'sd-btn';
            document.getElementById('btn-dub').className = l === 'dub' ? 'sd-btn active' : 'sd-btn';
            refreshTITAN();
        }

        function closePlayer() { document.getElementById('player-view').style.display = 'none'; }
    </script>
</body>
</html>
