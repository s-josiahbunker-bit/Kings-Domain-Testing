<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING'S DOMAIN | SHADOW V80</title>
    <!-- Add your CSS and Fonts here -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p5-pink-red: #ff1f44; --p5-black: #000000; --p5-card-bg: #141414; }
        body { margin: 0; background: var(--p5-black); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .workspace { height: 100vh; overflow-y: auto; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: var(--p5-card-bg); border-radius: 12px; height: 380px; overflow: hidden; cursor: pointer; border: 1px solid #1a1a1a; }
        .card img { width: 100%; height: 80%; object-fit: cover; }
        .card p { text-align: center; font-size: 12px; font-weight: bold; }
        #player-view { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: black; z-index: 9999; }
        #gameFrame { width: 100%; height: 90vh; border: none; }
        .api-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 99999; display: flex; justify-content: center; align-items: center; }
        .api-modal-box { background: #111; padding: 40px; border: 2px solid var(--p5-pink-red); text-align: center; }
    </style>
</head>
<body>

    <div class="workspace">
        <input type="text" id="searchBox" placeholder="Search..." onkeydown="if(event.key==='Enter') searchGlobal()">
        <div class="grid" id="mainGrid"></div>
    </div>

    <div id="player-view">
        <button onclick="closePlayer()">BACK</button>
        <div id="animeToggle">
            <button id="btn-sub" onclick="setLang('sub')">Sub</button>
            <button id="btn-dub" onclick="setLang('dub')">Dub</button>
        </div>
        <iframe id="gameFrame" src=""></iframe>
    </div>

    <div class="api-modal-overlay" id="apiModal" style="display:none;">
        <div class="api-modal-box">
            <h2>TMDB API KEY REQUIRED</h2>
            <input type="text" id="apiKeyInput" placeholder="Paste your API key here...">
            <button onclick="saveApiKey()">ACTIVATE</button>
        </div>
    </div>

    <script>
        let TMDB_KEY = localStorage.getItem('tmdb_api_key') || '';
        let mission = { id: "", type: "movie", season: 1, episode: 1, lang: "sub", provider: "node1" };

        const SERVER_NODES = {
            node1: {
                name: "VidSrc",
                buildUrl: (type, id, s, e, lang) => {
                    const l = lang === 'dub' ? '&dub=1' : '&sub=1';
                    return type === 'movie' ? `https://vidsrc.xyz/embed/movie/${id}` : `https://vidsrc.xyz/embed/tv/${id}/${s}/${e}${l}`;
                }
            }
        };

        function init() {
            if (!TMDB_KEY) document.getElementById('apiModal').style.display = 'flex';
            fetchPopular();
        }

        function saveApiKey() {
            TMDB_KEY = document.getElementById('apiKeyInput').value.trim();
            localStorage.setItem('tmdb_api_key', TMDB_KEY);
            document.getElementById('apiModal').style.display = 'none';
            fetchPopular();
        }

        async function fetchPopular() {
            if(!TMDB_KEY) return;
            const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_KEY}&sort_by=popularity.desc`);
            const data = await res.json();
            render(data.results.map(i => ({id: i.id, name: i.title, img: 'https://image.tmdb.org/t/p/w500'+i.poster_path, type: 'movie'})));
        }

        function render(items) {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<img src="${item.img}"><p>${item.name}</p>`;
                div.onclick = () => launch(item);
                grid.appendChild(div);
            });
        }

        function launch(item) {
            mission.id = item.id;
            mission.type = item.type;
            document.getElementById('player-view').style.display = 'block';
            refreshTITAN();
        }

        function refreshTITAN() {
            const f = document.getElementById('gameFrame');
            const node = SERVER_NODES[mission.provider];
            f.src = node.buildUrl(mission.type, mission.id, mission.season, mission.episode, mission.lang);
        }

        function setLang(lang) {
            mission.lang = lang;
            refreshTITAN();
        }

        function closePlayer() { document.getElementById('player-view').style.display = 'none'; document.getElementById('gameFrame').src = ''; }

        init();
    </script>
</body>
</html>
