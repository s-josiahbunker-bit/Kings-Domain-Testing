<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King's Domain | Unblocked Games</title>
    <style>
        /* CSS STYLING */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #0a0a0a;
            color: white;
            overflow-x: hidden;
        }

        /* Navigation Bar */
        .navbar {
            background: #000;
            padding: 12px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #ff4757;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { 
            font-size: 22px; 
            font-weight: bold; 
            color: #ff4757; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }

        /* SMALLER BANNER */
        .hero-banner {
            width: 100%;
            height: 180px; /* Made it smaller */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=2070');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .hero-banner h1 { font-size: 36px; margin: 0; text-shadow: 0 0 15px #ff4757; }
        .hero-banner p { font-size: 16px; color: #ccc; margin-top: 5px; }

        /* SEARCH BAR SECTION */
        .search-container {
            padding: 20px 5% 0 5%;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }
        #search-input {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            border-radius: 25px;
            border: 2px solid #333;
            background: #161616;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        #search-input:focus {
            border-color: #ff4757;
            box-shadow: 0 0 10px rgba(255, 71, 87, 0.3);
        }

        /* GRID SECTION */
        #home-view { display: block; }
        .container { padding: 20px 5% 50px 5%; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* GAME CARDS */
        .game-card {
            background: #161616;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid #222;
        }
        .game-card:hover {
            transform: translateY(-5px);
            border-color: #ff4757;
        }
        .game-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            display: block;
        }
        .game-card p {
            text-align: center;
            padding: 10px;
            margin: 0;
            font-weight: bold;
            font-size: 14px;
        }

        /* PLAYER VIEW */
        #player-view {
            display: none;
            width: 100%;
            height: 95vh;
            flex-direction: column;
            align-items: center;
            background: #000;
        }
        .controls {
            width: 100%;
            padding: 10px 5%;
            background: #111;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
        }
        .back-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        iframe {
            width: 95%;
            height: 85%;
            margin-top: 10px;
            border: 2px solid #333;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo" onclick="goHome()">KING'S DOMAIN</div>
    </div>

    <!-- HOME VIEW -->
    <div id="home-view">
        <div class="hero-banner">
            <h1>KING'S DOMAIN</h1>
            <p>Unblocked Games</p>
        </div>

        <!-- SEARCH BAR ABOVE GAMES -->
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search for a game..." onkeyup="filterGames()">
        </div>

        <div class="container">
            <div class="grid" id="game-grid">
                <!-- JavaScript will load games here -->
            </div>
        </div>
    </div>

    <!-- PLAYER VIEW -->
    <div id="player-view">
        <div class="controls">
            <button class="back-btn" onclick="goHome()">← BACK</button>
            <h2 id="current-title" style="margin:0;">Game Title</h2>
            <div style="width:50px;"></div>
        </div>
        <iframe id="game-frame" src="" frameborder="0" allowfullscreen></iframe>
    </div>

    <script>
        // GAME LIST
        const games = [
            {
                title: "Slope",
                image: "https://classroom-6x.lol/_next/image?url=https%3A%2F%2Fcdn.shst.at%2Fimages%2Fgames%2Fslope.png&w=128&q=75",
                url: "https://kkgames.github.io/slope/"
            },
            {
                title: "1v1.LOL",
                image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRzY3zN8N_X1Nf5YpPZ5o8E9h-pL-lqS-mEig&s",
                url: "https://1v1.lol"
            },
            {
                title: "Tunnel Rush",
                image: "https://edumaps.net/wp-content/uploads/2022/12/tunnel-rush.png",
                url: "https://kkgames.github.io/tunnel-rush/"
            },
            {
                title: "Drive Mad",
                image: "https://cdn.shst.at/images/games/drive-mad.png",
                url: "https://kkgames.github.io/drive-mad/"
            }
        ];

        const grid = document.getElementById('game-grid');
        const homeView = document.getElementById('home-view');
        const playerView = document.getElementById('player-view');
        const gameFrame = document.getElementById('game-frame');
        const titleText = document.getElementById('current-title');

        // FUNCTION TO RENDER GAMES
        function renderGames(gamesToDisplay) {
            grid.innerHTML = ""; // Clear grid
            gamesToDisplay.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `<img src="${game.image}"><p>${game.title}</p>`;
                card.onclick = () => {
                    homeView.style.display = 'none';
                    playerView.style.display = 'flex';
                    gameFrame.src = game.url;
                    titleText.innerText = game.title;
                    window.scrollTo(0,0);
                };
                grid.appendChild(card);
            });
        }

        // SEARCH FUNCTION
        function filterGames() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = games.filter(game => game.title.toLowerCase().includes(query));
            renderGames(filtered);
        }

        function goHome() {
            homeView.style.display = 'block';
            playerView.style.display = 'none';
            gameFrame.src = "";
        }

        // Initial Load
        renderGames(games);
    </script>
</body>
</html>
