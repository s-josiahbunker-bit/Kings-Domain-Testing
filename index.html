<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King's Domain | Unblocked</title>
    <style>
        /* CSS - THE LOOK */
        body {
            margin: 0;
            background-color: #0f0f0f;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
        }

        /* BANNER */
        .banner {
            width: 100%;
            height: 300px;
            /* REPLACE THE LINK BELOW WITH YOUR BANNER IMAGE */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 4px solid #ff4757;
        }

        .banner h1 { font-size: 50px; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); margin: 0; }

        /* GRID */
        .container { padding: 40px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-5px); border-color: #ff4757; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card p { padding: 10px; margin: 0; font-weight: bold; }

        /* GAME PLAYER (MODAL) */
        #game-overlay {
            display: none; /* Hidden until a game is clicked */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            flex-direction: column;
        }

        .controls { padding: 15px; background: #000; display: flex; justify-content: space-between; align-items: center; }
        .btn-back { background: #ff4757; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <!-- HOME VIEW -->
    <div id="home-view">
        <div class="banner">
            <h1>KING'S DOMAIN</h1>
        </div>

        <div class="container">
            <h2>Select a Game</h2>
            <div class="grid" id="game-grid">
                <!-- Games will appear here -->
            </div>
        </div>
    </div>

    <!-- GAME PLAYER VIEW -->
    <div id="game-overlay">
        <div class="controls">
            <button class="btn-back" onclick="closeGame()">← BACK TO HOME</button>
            <span id="now-playing">Game Title</span>
            <div style="width: 100px;"></div>
        </div>
        <iframe id="game-iframe" src=""></iframe>
    </div>

    <script>
        // DATA - Put your links here
        const gamesList = [
            {
                name: "Slope",
                img: "https://classroom-6x.lol/_next/image?url=https%3A%2F%2Fcdn.shst.at%2Fimages%2Fgames%2Fslope.png&w=128&q=75",
                url: "https://kkgames.github.io/slope/"
            },
            {
                name: "Tunnel Rush",
                img: "https://edumaps.net/wp-content/uploads/2022/12/tunnel-rush.png",
                url: "https://kkgames.github.io/tunnel-rush/"
            },
            {
                name: "1v1.LOL",
                img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRzY3zN8N_X1Nf5YpPZ5o8E9h-pL-lqS-mEig&s",
                url: "https://1v1.lol"
            },
            {
                name: "Drive Mad",
                img: "https://cdn.shst.at/images/games/drive-mad.png",
                url: "https://kkgames.github.io/drive-mad/"
            }
        ];

        // LOGIC - Loading the grid
        const grid = document.getElementById('game-grid');
        const overlay = document.getElementById('game-overlay');
        const iframe = document.getElementById('game-iframe');
        const titleText = document.getElementById('now-playing');

        gamesList.forEach(game => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<img src="${game.img}"><p>${game.name}</p>`;
            div.onclick = () => {
                titleText.innerText = game.name;
                iframe.src = game.url;
                overlay.style.display = 'flex';
                document.body.style.overflow = 'hidden'; // Stop scrolling
            };
            grid.appendChild(div);
        });

        function closeGame() {
            overlay.style.display = 'none';
            iframe.src = ""; // Stop the game
            document.body.style.overflow = 'auto'; // Allow scrolling
        }
    </script>
</body>
</html>
