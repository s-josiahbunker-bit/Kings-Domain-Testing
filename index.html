<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="origin">
    <title>KING'S DOMAIN | CINEMA V42</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/vYm6vS6/Take-Your-Heart.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --p5-pink-red: #ff1f44; --p5-black: #000000; --p5-card-bg: #141414;
            --Home-Wallpaper: url('https://wallpapers.com/images/hd/persona-5-background-030o8u3u29n532no.jpg');
            --Movie-Wallpaper: url('https://wallpaperaccess.com/full/1531383.jpg');
            --Show-Wallpaper: url('https://wallpapercave.com/wp/wp4047814.jpg');
            --Anime-Wallpaper: url('https://images8.alphacoders.com/132/1325171.jpeg');
            --Sidebar-Wallpaper: url('https://images.alphacoders.com/691/691456.jpg');
            --Banner-Art: url('https://images8.alphacoders.com/132/1325171.jpeg');
            --Menu-Img: url('https://i.ibb.co/68v8T3G/p5-menu.jpg'); 

            /* --- PHANTOM CURSOR ASSETS --- */
            --cursor-default: url('https://i.ibb.co/4PDX5xP/cursor-arrow.png'); /* IMAGE 1 */
            --cursor-pointer: url('https://i.ibb.co/Pj0Qp8t/cursor-dagger.png'); /* IMAGE 2 */
            --cursor-text: url('https://i.ibb.co/f4p7vWf/cursor-text.png');    /* IMAGE 3 */
        }

        /* --- GLOBAL CURSOR ROUTING --- */
        html, body { 
            margin: 0; padding: 0; height: 100%; 
            background-color: var(--p5-black); color: white; 
            font-family: 'Inter', sans-serif; overflow: hidden; 
            cursor: var(--cursor-default), auto; 
        }
        a, button, .card, .nav-btn, .sidebar-item, .sd-btn, .ep-btn, select, .p-btn, .nav-btn { 
            cursor: var(--cursor-pointer), pointer !important; 
        }
        input[type="text"], #searchBox { 
            cursor: var(--cursor-text), text !important; 
        }

        #bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), var(--Home-Wallpaper); background-size: cover; background-attachment: fixed; background-position: center; z-index: -1; transition: background-image 0.8s ease; }

        /* V-NAV */
        .v-nav { position: fixed; left: 0; top: 0; height: 100%; width: 85px; background: #000; border-right: 2px solid var(--p5-pink-red); display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 20px; z-index: 1000; }
        .nav-btn { width: 65px; height: 65px; background-image: var(--Menu-Img); background-size: contain; background-repeat: no-repeat; background-position: center; transition: 0.3s; mix-blend-mode: screen; }
        .nav-btn:hover { transform: scale(1.1); filter: drop-shadow(0 0 10px var(--p5-pink-red)); }
        
        #sidebar { position: fixed; top: 0; left: -320px; width: 310px; height: 100%; background-image: linear-gradient(rgba(0,0,0,0.95), rgba(0,0,0,0.95)), var(--Sidebar-Wallpaper); background-size: cover; border-right: 4px solid var(--p5-pink-red); z-index: 2001; transition: 0.5s ease; padding: 50px 20px; box-sizing: border-box; }
        #sidebar.active { left: 0; }
        .sidebar-header { color: var(--p5-pink-red); font-weight: 900; font-size: 24px; text-transform: uppercase; margin-bottom: 20px; border-bottom: 2px solid #222; }
        .sidebar-item { display: flex; align-items: center; gap: 15px; padding: 18px; color: white; text-decoration: none; font-weight: 900; font-size: 20px; text-transform: uppercase; transition: 0.3s; }
        .sidebar-item:hover { color: var(--p5-pink-red); padding-left: 30px; background: rgba(255, 31, 68, 0.1); }

        /* TOP BAR */
        .top-bar { margin-left: 85px; padding: 15px 50px; background: rgba(0,0,0,0.5); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo-text { color: var(--p5-pink-red); font-weight: 900; font-size: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .workspace { margin-left: 85px; height: calc(100% - 60px); width: calc(100% - 85px); overflow-y: auto; box-sizing: border-box; position: relative; scroll-behavior: smooth; }
        .container { padding: 40px 60px; max-width: 1400px; margin: 0 auto; }
        
        .hero-banner { width: 100%; height: 280px; border-radius: 20px; margin-bottom: 30px; background: linear-gradient(to right, rgba(0,0,0,1) 40%, transparent), var(--Banner-Art); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; padding-left: 60px; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.1); }
        .hero-banner h1 { font-size: 44px; margin: 0; font-weight: 900; text-transform: uppercase; }

        #searchBox { width: 100%; padding: 18px 25px; background: var(--p5-card-bg); border: 1px solid #222; border-radius: 8px; color: white; margin-bottom: 30px; outline: none; font-size: 16px; border: 1px solid transparent; }
        #searchBox:focus { border-color: var(--p5-pink-red); box-shadow: 0 0 15px rgba(255, 31, 68, 0.3); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: var(--p5-card-bg); border-radius: 12px; height: 380px; position: relative; overflow: hidden; border: 1px solid #1a1a1a; transition: 0.3s; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card p { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); margin: 0; padding: 12px 0; text-align: center; font-size: 11px; font-weight: 700; border-top: 1px solid var(--p5-pink-red); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* XPS OVERDRIVE PLAYER */
        #player-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 10000; flex-direction: column; }
        .player-bar { height: 60px; padding: 0 40px; background: #000; border-bottom: 2px solid var(--p5-pink-red); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .main-player-area { display: flex; flex-direction: row; height: calc(100% - 60px); width: 100%; }
        #gameFrame { flex: 1; border: none; background: #000; }

        .ep-sidebar { width: 320px; background: #0f1015; border-left: 1px solid #222; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .ep-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .ep-sidebar h3 { font-size: 12px; margin: 0; color: #fff; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }

        .sd-toggle { display: flex; background: #222; border-radius: 4px; border: 1px solid #444; overflow: hidden; }
        .sd-btn { background: transparent; border: none; color: #888; padding: 4px 10px; font-size: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .sd-btn.active { background: var(--p5-pink-red); color: white; }

        .ep-top-nav { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .ep-select { background: #1a1b23; border: 1px solid #333; color: #aaa; padding: 8px; border-radius: 4px; font-size: 12px; font-weight: bold; outline: none; width: 100%; }
        .ep-select:focus { border-color: var(--p5-pink-red); color: #fff; }

        .ep-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .ep-btn { background: #23242d; border: none; color: #999; padding: 12px 0; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
        .ep-btn.active { background: linear-gradient(to bottom right, var(--p5-pink-red), #900); color: #fff; box-shadow: 0 0 10px rgba(255,31,68,0.5); }

        .p-btn { background: var(--p5-pink-red); color: white; border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; text-transform: uppercase; font-size: 11px; }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <nav class="v-nav"><div class="nav-btn" onclick="toggleSidebar()"></div></nav>

    <div id="sidebar" onmouseleave="closeSidebar()">
        <div style="text-align:center; margin-bottom:30px;"><img src="https://i.ibb.co/vYm6vS6/Take-Your-Heart.png" style="width:120px;"></div>
        <div class="sidebar-header">STATIONS</div>
        <div class="sidebar-item" onclick="changeHub('arcade')"><i class="fas fa-gamepad"></i> Arcade</div>
        <div class="sidebar-item" onclick="changeHub('movie')"><i class="fas fa-film"></i> Movies</div>
        <div class="sidebar-item" onclick="changeHub('tv')"><i class="fas fa-tv"></i> Shows</div>
        <div class="sidebar-item" onclick="changeHub('anime')"><i class="fas fa-dragon"></i> Anime</div>
    </div>

    <div class="top-bar">
        <div class="logo-text">KING'S DOMAIN</div>
        <div id="status-text" style="font-size: 11px; opacity: 0.5; letter-spacing: 2px;">OVERDRIVE_V42_ONLINE</div>
    </div>

    <div class="workspace" id="workspace">
        <div id="grid-content" class="container">
            <header class="hero-banner">
                <h1 id="banner-text">MISSION HUB</h1>
                <p id="banner-sub">Safe Sandbox Active. Mirror-C Database scanning enabled. Infinite scroll loaded.</p>
            </header>
            <input type="text" id="searchBox" placeholder="Search mission database..." onkeydown="if(event.key==='Enter') searchGlobal()">
            <div class="grid" id="mainGrid"></div>
            <div id="scroll-loader" style="text-align:center; padding: 40px; display:none; color:var(--p5-pink-red); font-weight:900;">SCANNING NEXT TARGETS...</div>
        </div>
    </div>

    <!-- XPS SANDBOXED PLAYER -->
    <div id="player-view">
        <div class="player-bar">
            <button class="p-btn" onclick="closePlayer()">← BACK</button>
            <span id="playing-title" style="font-weight:900; color:var(--p5-pink-red);">XPS MISSION IN PROGRESS</span>
            <button class="p-btn" onclick="goFull()">FULLSCREEN</button>
        </div>
        <div class="main-player-area">
            <iframe id="gameFrame" 
                    sandbox="allow-forms allow-scripts allow-pointer-lock allow-same-origin allow-top-navigation"
                    src="" allowfullscreen></iframe>
            
            <div class="ep-sidebar" id="epSidebar">
                <div class="ep-header-row">
                    <h3>MISSION STEPS</h3>
                    <div class="sd-toggle" id="animeToggle" style="display:none;">
                        <button id="btn-sub" class="sd-btn active" onclick="setLang('sub')">Sub</button>
                        <button id="btn-dub" class="sd-btn" onclick="setLang('dub')">Dub</button>
                    </div>
                </div>
                <div class="ep-top-nav" id="media-controls">
                    <select id="seasonSelect" class="ep-select" onchange="handleSeasonChange()"></select>
                    <!-- NON-EXCLUDED OVERDRIVE SERVERS -->
                    <select id="serverSelect" class="ep-select" onchange="handleServerChange()">
                        <option value="vidapi">XPS Alpha (VidApi - Global Stable)</option>
                        <option value="nostrem">XPS Beta (Nostrem - HighBitrate)</option>
                        <option value="autopv">XPS Gamma (AutoPV - MultiMirror)</option>
                    </select>
                </div>
                <div class="ep-grid" id="epGrid"></div>
            </div>
        </div>
    </div>

    <script>
        const TMDB_KEY = "cce36626c4c9d64a54c0731adcaa1d8f"; 
        
        let mission = {
            id: "", type: "movie", season: 1, episode: 1,
            lang: localStorage.getItem('p5_pref_lang') || "sub",
            provider: "vidapi"
        };
        
        let currentMode = "home", currentShowData = null, currentPage = 1, isFetching = false, canLoadMore = true;

        const games = [
            { name: "Slime Rancher", img: "https://sm.ign.com/ign_es/cover/s/slime-ranc/slime-rancher_j318.jpg", url: "slimerancher.html", isArcade: true },
            { name: "Helltaker", img: "https://files.catbox.moe/k9d5o6.png", url: "helltaker.html", isArcade: true },
            { name: "Slope", img: "https://sm.ign.com/ign_br/game/s/slope/slope_69qy.jpg", url: "https://kkgames.github.io/slope/", isArcade: true }
        ];

        async function changeHub(mode) {
            currentMode = mode; closeSidebar(); currentPage = 1; canLoadMore = true;
            document.getElementById('grid-content').style.display = 'block';
            document.getElementById('searchBox').value = '';
            document.getElementById('mainGrid').innerHTML = '';
            if(mode === 'arcade') { 
                bgLayer.style.backgroundImage = "linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), var(--Home-Wallpaper)";
                render(games, false); canLoadMore = false; 
            } else { 
                let wall = (mode === 'tv') ? 'var(--Show-Wallpaper)' : (mode === 'anime' ? 'var(--Anime-Wallpaper)' : 'var(--Movie-Wallpaper)');
                bgLayer.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), ${wall}`;
                await fetchAPI(mode); 
            }
        }

        async function fetchAPI(type, isLoadMore = false) {
            if (isFetching || !canLoadMore) return;
            isFetching = true;
            if(isLoadMore) document.getElementById('scroll-loader').style.display = 'block';
            let url = `https://api.themoviedb.org/3/discover/${type === 'movie' ? 'movie' : 'tv'}?api_key=${TMDB_KEY}&sort_by=popularity.desc&page=${currentPage}`;
            if (type === 'anime') url += `&with_genres=16&with_original_language=ja`;
            const res = await fetch(url); const data = await res.json();
            if(data.results && data.results.length > 0) { 
                render(data.results.map(i => ({ id: i.id, name: i.title || i.name, img: `https://image.tmdb.org/t/p/w500${i.poster_path}`, type: (type === 'movie' ? 'movie' : 'tv') })), isLoadMore); 
                currentPage++; 
            } else { canLoadMore = false; }
            isFetching = false; document.getElementById('scroll-loader').style.display = 'none';
        }

        async function searchGlobal() {
            canLoadMore = false; const query = document.getElementById('searchBox').value;
            let url = (currentMode === 'movie') ? `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}` : `https://api.themoviedb.org/3/search/tv?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}`;
            if (currentMode === 'arcade' || currentMode === 'anime' || currentMode === 'home') url = `https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}`;
            const res = await fetch(url); const data = await res.json();
            let results = data.results;
            if (currentMode === 'anime') results = results.filter(i => i.genre_ids && i.genre_ids.includes(16));
            render(results.filter(i => i.poster_path).map(i => ({ id: i.id, name: i.title || i.name, img: `https://image.tmdb.org/t/p/w500${i.poster_path}`, type: (currentMode === 'movie' ? 'movie' : 'tv') })), false);
        }

        function render(data, isLoadMore) {
            const grid = document.getElementById('mainGrid'); if (!isLoadMore) grid.innerHTML = '';
            data.forEach(item => {
                if(item.img && !item.img.includes('null')) {
                    const card = document.createElement('div'); card.className = 'card';
                    card.innerHTML = `<img src="${item.img}"><p>${item.name}</p>`;
                    card.onclick = () => item.isArcade ? launchArcade(item) : launchTITAN(item); grid.appendChild(card);
                }
            });
        }

        /* --- ARCADE TERMINAL --- */
        function launchArcade(game) {
            const f = document.getElementById('gameFrame');
            document.getElementById('player-view').style.display = 'flex';
            document.getElementById('epSidebar').style.display = 'none';
            document.getElementById('playing-title').innerText = game.name.toUpperCase();
            f.removeAttribute('sandbox'); 
            f.src = game.url;
        }

        /* --- XPS TITAN MEDIA HUB --- */
        async function launchTITAN(item) {
            mission.id = item.id; mission.type = (item.type === 'tv' || currentMode === 'tv' || currentMode === 'anime') ? 'tv' : 'movie';
            document.getElementById('player-view').style.display = 'flex';
            document.getElementById('epSidebar').style.display = 'flex';
            document.getElementById('playing-title').innerText = item.name.toUpperCase();
            document.getElementById('animeToggle').style.display = (currentMode === 'anime' || mission.type === 'tv') ? 'flex' : 'none';
            document.getElementById('seasonSelect').style.display = (mission.type === 'tv') ? 'block' : 'none';
            document.getElementById('gameFrame').setAttribute('sandbox', 'allow-forms allow-scripts allow-pointer-lock allow-same-origin allow-top-navigation');

            updateLangButtons();
            if(mission.type === 'tv') {
                const res = await fetch(`https://api.themoviedb.org/3/tv/${item.id}?api_key=${TMDB_KEY}`);
                currentShowData = await res.json();
                const sel = document.getElementById('seasonSelect'); sel.innerHTML = '';
                currentShowData.seasons.forEach(s => { if(s.episode_count > 0) { let o = document.createElement('option'); o.value = s.season_number; o.innerText = `Season ${s.season_number}`; sel.appendChild(o); } });
                mission.season = currentShowData.seasons.find(s => s.season_number > 0)?.season_number || 0;
                mission.episode = 1; sel.value = mission.season; 
                buildEpGrid(mission.season, currentShowData.seasons.find(s => s.season_number == mission.season).episode_count);
            } else { document.getElementById('epGrid').innerHTML = ''; }
            refreshTITAN();
        }

        function refreshTITAN() {
            const f = document.getElementById('gameFrame');
            let url = "";
            let s = mission.season; let e = mission.episode;
            let dubFlag = (mission.lang === 'dub') ? '?lang=en&audio=en' : '';

            if (mission.provider === "vidapi") {
                url = `https://vidapi.me/embed/${mission.type}/${mission.id}${mission.type==='tv' ? '/' + s + '/' + e : ''}${dubFlag}`;
            } else if (mission.provider === "nostrem") {
                url = (mission.type === 'movie') ? `https://www.nostrem.com/embed/movie/${mission.id}` : `https://www.nostrem.com/embed/tv/${mission.id}/${s}/${e}`;
            } else if (mission.provider === "autopv") {
                url = `https://autopv.xyz/embed/${mission.type}/${mission.id}${mission.type==='tv' ? '/' + s + '/' + e : ''}`;
            }
            f.src = url;
        }

        function setLang(lang) { mission.lang = lang; localStorage.setItem('p5_pref_lang', lang); updateLangButtons(); refreshTITAN(); }
        function updateLangButtons() { document.getElementById('btn-sub').classList.toggle('active', mission.lang === 'sub'); document.getElementById('btn-dub').classList.toggle('active', mission.lang === 'dub'); }
        function handleSeasonChange() { mission.season = document.getElementById('seasonSelect').value; mission.episode = 1; buildEpGrid(mission.season, currentShowData.seasons.find(s => s.season_number == mission.season).episode_count); refreshTITAN(); }
        function handleServerChange() { mission.provider = document.getElementById('serverSelect').value; refreshTITAN(); }
        function buildEpGrid(sn, count) { const g = document.getElementById('epGrid'); g.innerHTML = ''; for(let i=1; i<=count; i++) { const b = document.createElement('button'); b.className = 'ep-btn'; b.innerText = i; if(i == mission.episode) b.classList.add('active'); b.onclick = () => { mission.episode = i; document.querySelectorAll('.ep-btn').forEach(btn => btn.classList.remove('active')); b.classList.add('active'); refreshTITAN(); }; g.appendChild(b); } }
        document.getElementById('workspace').addEventListener('scroll', (e) => { if (currentMode === 'arcade') return; const { scrollTop, scrollHeight, clientHeight } = e.target; if (scrollTop + clientHeight >= scrollHeight - 600) fetchAPI(currentMode, true); });
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('active'); }
        function closePlayer() { document.getElementById('player-view').style.display = 'none'; document.getElementById('gameFrame').src = ''; }
        function goFull() { const f = document.getElementById('gameFrame'); if (f.requestFullscreen) f.requestFullscreen(); else if (f.webkitRequestFullscreen) f.webkitRequestFullscreen(); }

        const bgLayer = document.getElementById('bg-layer');
        render(games, false);
    </script>
</body>
</html>
