<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING'S DOMAIN | FULL COVER VERSION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* ============================================================
           MASTER SETTINGS - CHANGE YOUR LINKS HERE
           ============================================================ */
        :root {
            --Wallpaper-URL: url('https://wallpapers.com/images/hd/persona-5-background-030o8u3u29n532no.jpg');
            --Banner-URL: url('https://images8.alphacoders.com/132/1325171.jpeg');
            --p5-pink-red: #ff1f44;
            --p5-black: #000000;
        }

        /* ============================================================
           DESIGN CODE
           ============================================================ */
        body {
            margin: 0; padding: 0; background-color: var(--p5-black);
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), var(--Wallpaper-URL);
            background-size: cover; background-attachment: fixed; background-position: center;
            color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 60px; background: #000; border-bottom: 2px solid var(--p5-pink-red);
        }
        .logo { color: var(--p5-pink-red); font-weight: 900; font-size: 18px; text-transform: uppercase; }

        .container { max-width: 1200px; margin: 0 auto; padding: 30px 60px; }

        .hero-banner {
            width: 100%; height: 320px; border-radius: 20px; 
            background: linear-gradient(to right, rgba(0,0,0,1) 40%, transparent), var(--Banner-URL);
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center;
            padding-left: 60px; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 25px;
        }
        .hero-banner h1 { font-size: 44px; margin: 0; font-weight: 800; text-transform: uppercase; }

        #gameSearch {
            width: 100%; padding: 15px 25px; background: #141414; 
            border: 1px solid #222; border-radius: 8px; color: white; margin-bottom: 30px; outline: none;
        }

        /* GRID SETTINGS */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 20px;
        }

        /* CARD SETTINGS - THE COVER FIX */
        .card {
            background: #141414;
            border-radius: 12px;
            height: 380px; /* Tall vertical rectangle */
            position: relative; /* Needed to place text on top */
            overflow: hidden;
            border: 1px solid #1a1a1a;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .card:hover {
            border-color: var(--p5-pink-red);
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(255, 31, 68, 0.3);
        }

        /* THE IMAGE COVER FIX */
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* THIS MAKES THE IMAGE COVER THE CARD */
            display: block;
            transition: transform 0.5s ease;
        }

        .card:hover img {
            transform: scale(1.1); /* Slight zoom on hover */
        }

        /* TEXT OVERLAY (Bottom Bar) */
        .card p {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.8); /* Dark bar behind text */
            margin: 0;
            padding: 15px 0;
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            color: white;
            border-top: 1px solid var(--p5-pink-red);
        }

        footer { background: #000; padding: 40px 60px; border-top: 2px solid var(--p5-pink-red); display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .social-links { display: flex; gap: 30px; }
        .social-links a { color: white; font-size: 26px; transition: 0.3s; }
        .social-links a:hover { color: var(--p5-pink-red); transform: scale(1.2); }

        #player-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 10000; flex-direction: column; }
        .back-bar { padding: 12px 40px; background: #000; border-bottom: 2px solid var(--p5-pink-red); display: flex; justify-content: space-between; align-items: center; }
        .btn { background: var(--p5-pink-red); color: white; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        iframe { flex-grow: 1; border: none; background: white; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">KING'S DOMAIN</div>
        <div style="font-size: 13px;">Unblocked Games</div>
    </nav>

    <div id="home-view" class="container">
        <header class="hero-banner">
            <h1>WELCOME BACK</h1>
            <p>The best unblocked games, updated daily.</p>
        </header>

        <input type="text" id="gameSearch" placeholder="Search for games..." onkeyup="filter()">

        <div class="grid" id="gameGrid"></div>
    </div>

    <footer>
        <div class="social-links">
            <a href="#"><i class="fab fa-discord"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
            <a href="#"><i class="fab fa-x-twitter"></i></a>
        </div>
    </footer>

    <div id="player-view">
        <div class="back-bar">
            <button class="btn" onclick="closeGame()">← BACK</button>
            <span id="playing-title" style="font-weight:bold;">GAME</span>
            <button class="btn" onclick="goFull()">FULLSCREEN</button>
        </div>
        <iframe id="gameFrame" src="" allowfullscreen></iframe>
    </div>

    <script>
        const games = [

            { name: "HellTaker", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQv1_j234jQIQ_uuusHgxrkTMKLn77KXX9jlA&s", url: "helltaker.html" },
            
            name: "Slime Rancher", img: "https://sm.ign.com/ign_es/cover/s/slime-ranc/slime-rancher_j318.jpg", url: "slimerancher.html" },
             
        { name: "Slope",img: "https://play-lh.googleusercontent.com/uGn_6O3Y94G56555444333222111", url: "https://kkgames.github.io/slope/"}
            },
            { 
                name: "1v1.LOL", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRzY3zN8N_X1Nf5YpPZ5o8E9h-pL-lqS-mEig&s", url: "https://1v1.lol" 
            },
            { 
                name: "BitLife", img: "https://play-lh.googleusercontent.com/H_f-R6U9p6M7L9f5B_R_3E5b6q9Z5F6", url: "https://bitlifeonline.io" 
            },
            { 
                name: "Drive Mad", img: "https://cdn.shst.at/images/games/drive-mad.png", url: "https://kkgames.github.io/drive-mad/" 
            }
        ];

        const grid = document.getElementById('gameGrid');
        const frame = document.getElementById('gameFrame');

        function render(data) {
            grid.innerHTML = '';
            data.forEach(game => {
                const card = document.createElement('div');
                card.className = 'card';
                // Note: Simplified HTML structure here to let the image fill the box
                card.innerHTML = `
                    <img src="${game.img}" alt="${game.name}">
                    <p>${game.name}</p>
                `;
                card.onclick = () => {
                    document.getElementById('home-view').style.display = 'none';
                    document.getElementById('player-view').style.display = 'flex';
                    frame.src = game.url;
                    document.getElementById('playing-title').innerText = game.name;
                };
                grid.appendChild(card);
            });
        }

        function filter() {
            const val = document.getElementById('gameSearch').value.toLowerCase();
            const f = games.filter(g => g.name.toLowerCase().includes(val));
            render(f);
        }

        function closeGame() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('player-view').style.display = 'none';
            frame.src = '';
        }

        function goFull() {
            if (frame.requestFullscreen) frame.requestFullscreen();
            else if (frame.webkitRequestFullscreen) frame.webkitRequestFullscreen();
        }

        render(games);
    </script>
</body>
</html>
