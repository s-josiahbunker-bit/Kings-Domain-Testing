<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King's Domain | Unblocked Hub</title>
    <style>
        /* 1. THE AESTHETIC WALLPAPER */
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            /* Gaming Grid Wallpaper */
            background-image: 
                radial-gradient(circle at 2px 2px, #1a1a1a 1px, transparent 0);
            background-size: 40px 40px;
            background-attachment: fixed;
            font-family: 'Oswald', 'Segoe UI', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* 2. NEON NAVBAR */
        .navbar {
            background: #000;
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { 
            font-size: 28px; 
            font-weight: 900; 
            color: #ff0000; 
            text-transform: uppercase;
            text-shadow: 2px 2px #550000;
        }

        /* 3. LONG ROUNDED BANNER */
        .banner-wrap {
            padding: 30px 20px 0 20px;
            display: flex;
            justify-content: center;
        }
        .hero-banner {
            width: 100%;
            max-width: 1200px; /* Long length */
            height: 200px;
            background: linear-gradient(45deg, rgba(255,0,0,0.2), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070');
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            border: 2px solid #ff0000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.3);
            text-align: center;
        }
        .hero-banner h1 { font-size: 50px; margin: 0; text-transform: uppercase; font-style: italic; }
        .hero-banner p { font-size: 18px; color: #ff4d4d; letter-spacing: 2px; }

        /* 4. SEARCH BAR */
        .search-section {
            display: flex;
            justify-content: center;
            padding: 30px 20px;
        }
        #search-box {
            width: 100%;
            max-width: 600px;
            padding: 15px 25px;
            border-radius: 10px;
            border: 2px solid #333;
            background: #111;
            color: white;
            font-size: 18px;
            outline: none;
            transition: 0.3s;
        }
        #search-box:focus {
            border-color: #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }

        /* 5. GAME GRID */
        .grid-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px 50px 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }
        .card {
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #222;
            cursor: pointer;
            transition: 0.2s ease;
            position: relative;
        }
        .card:hover {
            transform: scale(1.05);
            border-color: #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            z-index: 2;
        }
        .card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            filter: brightness(0.8);
        }
        .card:hover img { filter: brightness(1); }
        .card p {
            padding: 10px;
            margin: 0;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            background: #000;
        }

        /* 6. GAME PLAYER OVERLAY */
        #player {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            flex-direction: column;
        }
        .player-nav {
            padding: 10px 20px;
            background: #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ff0000;
        }
        .back-btn {
            background: #ff0000;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 900;
            text-transform: uppercase;
        }
        iframe {
            flex-grow: 1;
            border: none;
            width: 100%;
            height: 100%;
        }
    </style>
    <!-- Importing a gaming font -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- HOME PAGE -->
    <div id="home">
        <div class="navbar">
            <div class="logo">KING'S DOMAIN</div>
        </div>

        <div class="banner-wrap">
            <div class="hero-banner">
                <h1>KING'S DOMAIN</h1>
                <p>UNBLOCKED & FREE</p>
            </div>
        </div>

        <div class="search-section">
            <input type="text" id="search-box" placeholder="SEARCH FOR A GAME..." onkeyup="filterGames()">
        </div>

        <div class="grid-container">
            <div class="grid" id="game-grid">
                <!-- Games Load Here -->
            </div>
        </div>
    </div>

    <!-- FULLSCREEN PLAYER -->
    <div id="player">
        <div class="player-nav">
            <button class="back-btn" onclick="closeGame()">Back to Home</button>
            <span id="playing-title" style="font-weight:bold; color:red;">GAME NAME</span>
            <div style="width:100px;"></div>
        </div>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        // DATA - Put your King's Domain assets here
        const games = [
            { name: "Slope", img: "https://classroom-6x.lol/_next/image?url=https%3A%2F%2Fcdn.shst.at%2Fimages%2Fgames%2Fslope.png&w=128&q=75", url: "https://kkgames.github.io/slope/" },
            { name: "1v1.LOL", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRzY3zN8N_X1Nf5YpPZ5o8E9h-pL-lqS-mEig&s", url: "https://1v1.lol" },
            { name: "Tunnel Rush", img: "https://edumaps.net/wp-content/uploads/2022/12/tunnel-rush.png", url: "https://kkgames.github.io/tunnel-rush/" },
            { name: "BitLife", img: "https://play-lh.googleusercontent.com/H_f-R6U9p6M7L9f5B_R_3E5b6q9Z5F6", url: "https://bitlifeonline.io" },
            { name: "Drive Mad", img: "https://cdn.shst.at/images/games/drive-mad.png", url: "https://kkgames.github.io/drive-mad/" },
            { name: "EGG CAR", img: "https://play-lh.googleusercontent.com/I6PZpT0x", url: "https://kkgames.github.io/egg-car/" }
        ];

        const grid = document.getElementById('game-grid');

        function render(list) {
            grid.innerHTML = '';
            list.forEach(game => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${game.img}"><p>${game.name}</p>`;
                card.onclick = () => {
                    document.getElementById('home').style.display = 'none';
                    document.getElementById('player').style.display = 'flex';
                    document.getElementById('game-frame').src = game.url;
                    document.getElementById('playing-title').innerText = game.name;
                };
                grid.appendChild(card);
            });
        }

        function filterGames() {
            const val = document.getElementById('search-box').value.toLowerCase();
            const filtered = games.filter(g => g.name.toLowerCase().includes(val));
            render(filtered);
        }

        function closeGame() {
            document.getElementById('home').style.display = 'block';
            document.getElementById('player').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }

        // Run site
        render(games);
    </script>
</body>
</html>
