<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King's Domain | V2</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: white;
            font-family: 'Arial', sans-serif;
        }

        /* Nav */
        .nav {
            background: #000;
            padding: 10px 5%;
            border-bottom: 2px solid #ff4757;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 1. SMALLER BANNER */
        .banner {
            width: 100%;
            height: 120px; /* Very small height */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=2070');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. VERY VISIBLE SEARCH BAR */
        .search-area {
            background: #1a1a1a;
            padding: 20px;
            text-align: center;
        }

        #search-bar {
            width: 80%;
            max-width: 600px;
            padding: 15px;
            font-size: 18px;
            border-radius: 50px;
            border: 3px solid #ff4757; /* Red border */
            background: white; /* White background to stand out */
            color: black;
            outline: none;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            padding: 40px 5%;
        }

        .card {
            background: #161616;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover { border-color: #ff4757; transform: scale(1.05); }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card p { text-align: center; font-weight: bold; padding: 10px; margin: 0; }

        /* Game Player */
        #player-view {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 2000;
            flex-direction: column;
        }

        .back-btn {
            background: #ff4757;
            color: white;
            padding: 15px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="home-view">
        <div class="nav">
            <h2 style="color:#ff4757; margin:0;">KING'S DOMAIN</h2>
        </div>

        <div class="banner">
            <h1>UNBLOCKED GAMES</h1>
        </div>

        <!-- THE SEARCH BAR -->
        <div class="search-area">
            <input type="text" id="search-bar" placeholder="TYPE HERE TO SEARCH..." onkeyup="doSearch()">
        </div>

        <div class="grid" id="game-grid">
            <!-- Games go here -->
        </div>
    </div>

    <!-- PLAYER -->
    <div id="player-view">
        <button class="back-btn" onclick="closeGame()">← BACK TO HOME</button>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        const games = [
            { name: "Slope", img: "https://classroom-6x.lol/_next/image?url=https%3A%2F%2Fcdn.shst.at%2Fimages%2Fgames%2Fslope.png&w=128&q=75", url: "https://kkgames.github.io/slope/" },
            { name: "1v1.LOL", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRzY3zN8N_X1Nf5YpPZ5o8E9h-pL-lqS-mEig&s", url: "https://1v1.lol" },
            { name: "Tunnel Rush", img: "https://edumaps.net/wp-content/uploads/2022/12/tunnel-rush.png", url: "https://kkgames.github.io/tunnel-rush/" },
            { name: "BitLife", img: "https://play-lh.googleusercontent.com/H_f-R6U9p6M7L9f5B_R_3E5b6q9Z5F6", url: "https://bitlifeonline.io" }
        ];

        function showGames(list) {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            list.forEach(game => {
                const item = document.createElement('div');
                item.className = 'card';
                item.innerHTML = `<img src="${game.img}"><p>${game.name}</p>`;
                item.onclick = () => {
                    document.getElementById('home-view').style.display = 'none';
                    document.getElementById('player-view').style.display = 'flex';
                    document.getElementById('game-frame').src = game.url;
                };
                grid.appendChild(item);
            });
        }

        function doSearch() {
            const val = document.getElementById('search-bar').value.toLowerCase();
            const filtered = games.filter(g => g.name.toLowerCase().includes(val));
            showGames(filtered);
        }

        function closeGame() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('player-view').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }

        showGames(games);
    </script>
</body>
</html>
