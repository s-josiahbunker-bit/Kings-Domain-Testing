<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King's Domain | Unblocked</title>
    <style>
        /* BASE STYLES */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #0a0a0a;
            color: white;
            overflow-x: hidden;
        }

        /* NAVIGATION */
        .navbar {
            background: #000;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #ff4757;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-size: 24px; font-weight: bold; color: #ff4757; cursor: pointer; text-transform: uppercase; }

        /* THE BANNER SECTION */
        .hero-banner {
            width: 100%;
            height: 400px;
            /* CHANGE THE BANNER IMAGE URL BELOW */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=2070');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 5px solid #ff4757;
        }
        .hero-banner h1 { font-size: 60px; margin: 0; color: #fff; text-shadow: 0 0 20px #ff4757; }
        .hero-banner p { font-size: 20px; color: #ccc; margin-top: 10px; }

        /* HOME CONTENT (GRID) */
        #home-view { display: block; padding: 40px 5%; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-card {
            background: #161616;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid #222;
        }

        .game-card:hover {
            transform: scale(1.05);
            border-color: #ff4757;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.4);
        }

        .game-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
        }

        .game-card p {
            text-align: center;
            padding: 12px;
            margin: 0;
            font-weight: bold;
            font-size: 16px;
        }

        /* GAME PLAYER (IFRAME VIEW) */
        #player-view {
            display: none; /* Hidden at start */
            width: 100%;
            height: 95vh;
            flex-direction: column;
            align-items: center;
            background: #000;
        }

        .player-controls {
            width: 100%;
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            background: #111;
        }

        .back-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        iframe {
            width: 95%;
            height: 80%;
            margin-top: 20px;
            border: 2px solid #333;
            border-radius: 10px;
            background: #000;
        }
    </style>
</head>
<body>

    <!-- NAV BAR -->
    <div class="navbar">
        <div class="logo" onclick="goHome()">KING'S DOMAIN</div>
        <div style="color:#888; font-size: 14px;">Play Anywhere</div>
    </div>

    <!-- HOME VIEW (Banner + Games) -->
    <div id="home-view">
        <div class="hero-banner">
            <h1>KING'S DOMAIN</h1>
            <p>The Ultimate Collection of Unblocked Games</p>
        </div>

        <h2 style="margin: 40px 0 20px 0; border-left: 5px solid #ff4757; padding-left: 15px;">POPULAR GAMES</h2>
        
        <div class="grid" id="game-grid">
            <!-- JavaScript will load games here -->
        </div>
    </div>

    <!-- PLAYER VIEW (Game Window) -->
    <div id="player-view">
        <div class="player-controls">
            <button class="back-btn" onclick="goHome()">← BACK TO HOME</button>
            <h2 id="current-game-title" style="margin:0; font-size: 18px;">Game Title</h2>
            <div style="width: 100px;"></div> <!-- Spacer -->
        </div>
        <iframe id="game-frame" src="" frameborder="0" allowfullscreen></iframe>
    </div>

    <script>
        // GAME DATABASE
        // Replace 'url' with the actual link to play the game
        // Replace 'image' with the image URL from King's Domain
        const games = [
            {
                title: "Slope",
                image: "https://classroom-6x.lol/_next/image?url=https%3A%2F%2Fcdn.shst.at%2Fimages%2Fgames%2Fslope.png&w=128&q=75",
                url: "https://kkgames.github.io/slope/"
            },
            {
                title: "1v1.LOL",
                image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRzY3zN8N_X1Nf5YpPZ5o8E9h-pL-lqS-mEig&s",
                url: "https://1v1.lol"
            },
            {
                title: "Tunnel Rush",
                image: "https://edumaps.net/wp-content/uploads/2022/12/tunnel-rush.png",
                url: "https://kkgames.github.io/tunnel-rush/"
            },
            {
                title: "BitLife",
                image: "https://play-lh.googleusercontent.com/H_f-R6U9p6M7L9f5B_R_3E5b6q9Z5F6",
                url: "https://bitlifeonline.io"
            },
            {
                title: "Drive Mad",
                image: "https://cdn.shst.at/images/games/drive-mad.png",
                url: "https://kkgames.github.io/drive-mad/"
            }
        ];

        const homeView = document.getElementById('home-view');
        const playerView = document.getElementById('player-view');
        const gameFrame = document.getElementById('game-frame');
        const gameTitleDisplay = document.getElementById('current-game-title');
        const grid = document.getElementById('game-grid');

        // Create the game icons
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.innerHTML = `
                <img src="${game.image}" alt="${game.title}">
                <p>${game.title}</p>
            `;
            // When clicked, run the function to start the game
            card.onclick = () => launchGame(game.url, game.title);
            grid.appendChild(card);
        });

        // FUNCTION TO START GAME
        function launchGame(url, title) {
            homeView.style.display = 'none';    // Hide the Banner and Grid
            playerView.style.display = 'flex'; // Show the Player screen
            gameFrame.src = url;               // Put the game link in the iframe
            gameTitleDisplay.innerText = title; // Change the title at the top
            window.scrollTo(0,0);              // Scroll to top
        }

        // FUNCTION TO GO BACK
        function goHome() {
            homeView.style.display = 'block';  // Show Banner and Grid again
            playerView.style.display = 'none'; // Hide the Player
            gameFrame.src = "";                // Stop the game from running
        }
    </script>
</body>
</html>
