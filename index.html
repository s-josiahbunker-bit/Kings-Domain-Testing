<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING'S DOMAIN | UNBLOCKED</title>
    
    <!-- Bold Gaming Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* 1. CORE AESTHETIC */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            /* Classic Gaming Grid Background */
            background-image: 
                linear-gradient(to right, #111 1px, transparent 1px),
                linear-gradient(to bottom, #111 1px, transparent 1px);
            background-size: 40px 40px;
            color: white;
            font-family: 'Oswald', sans-serif;
            overflow-x: hidden;
        }

        /* 2. HEADER/NAV */
        .header {
            background: #000;
            padding: 10px 0;
            text-align: center;
            border-bottom: 4px solid #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo {
            font-family: 'Anton', sans-serif;
            font-size: 35px;
            color: #ff0000;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px #000, 0 0 10px #ff0000;
            text-decoration: none;
        }

        /* 3. LONG ROUNDED BANNER (Classic Aesthetic) */
        .banner-container {
            padding: 20px 5%;
            display: flex;
            justify-content: center;
        }
        .hero-banner {
            width: 100%;
            max-width: 1200px;
            height: 160px;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070');
            background-size: cover;
            background-position: center;
            border-radius: 15px;
            border: 3px solid #ff0000;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.3);
        }
        .hero-banner h1 {
            font-family: 'Anton', sans-serif;
            font-size: 50px;
            margin: 0;
            color: #fff;
            text-shadow: 4px 4px 0px #ff0000;
        }

        /* 4. SEARCH BAR */
        .search-wrap {
            display: flex;
            justify-content: center;
            padding: 10px 0 30px 0;
        }
        #search-input {
            width: 90%;
            max-width: 500px;
            padding: 12px 20px;
            border-radius: 5px;
            border: 2px solid #ff0000;
            background: #111;
            color: #fff;
            font-family: 'Oswald', sans-serif;
            font-size: 18px;
            outline: none;
        }

        /* 5. GAME GRID (CLASSIC STYLE) */
        .grid-wrapper {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px 50px 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .card {
            background: #111;
            border: 2px solid #222;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .card:hover {
            border-color: #ff0000;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
            z-index: 5;
        }
        .card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            display: block;
        }
        .card p {
            margin: 0;
            padding: 8px;
            text-align: center;
            background: #000;
            font-size: 14px;
            color: #ccc;
            border-top: 1px solid #222;
        }
        .card:hover p {
            color: #ff0000;
        }

        /* 6. GAME PLAYER (INTERNAL) */
        #game-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 2000;
            flex-direction: column;
        }
        .player-nav {
            background: #111;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #ff0000;
        }
        .back-btn {
            background: #ff0000;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Anton', sans-serif;
            font-size: 16px;
        }
        iframe {
            flex-grow: 1;
            border: none;
            background: #fff; /* Helps some games load textures */
        }
    </style>
</head>
<body>

    <!-- HOME VIEW -->
    <div id="home-view">
        <div class="header">
            <a href="#" class="logo" onclick="location.reload()">KING'S DOMAIN</a>
        </div>

        <div class="banner-container">
            <div class="hero-banner">
                <h1>UNBLOCKED GAMES</h1>
            </div>
        </div>

        <div class="search-wrap">
            <input type="text" id="search-input" placeholder="SEARCH GAMES..." onkeyup="filter()">
        </div>

        <div class="grid-wrapper">
            <div class="grid" id="game-grid">
                <!-- Games go here -->
            </div>
        </div>
    </div>

    <!-- PLAYER VIEW -->
    <div id="game-screen">
        <div class="player-nav">
            <button class="back-btn" onclick="closeGame()">BACK</button>
            <span id="game-title" style="font-family:'Anton'; color:white; font-size:20px;">GAME NAME</span>
            <div style="width: 100px;"></div>
        </div>
        <iframe id="game-frame" src="" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
    </div>

    <script>
        // DATA
        const games = [
            { name: "Slope", img: "https://classroom-6x.lol/_next/image?url=https%3A%2F%2Fcdn.shst.at%2Fimages%2Fgames%2Fslope.png&w=128&q=75", url: "https://kkgames.github.io/slope/" },
            { name: "1v1.LOL", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRzY3zN8N_X1Nf5YpPZ5o8E9h-pL-lqS-mEig&s", url: "https://1v1.lol" },
            { name: "Tunnel Rush", img: "https://edumaps.net/wp-content/uploads/2022/12/tunnel-rush.png", url: "https://kkgames.github.io/tunnel-rush/" },
            { name: "BitLife", img: "https://play-lh.googleusercontent.com/H_f-R6U9p6M7L9f5B_R_3E5b6q9Z5F6", url: "https://bitlifeonline.io" },
            { name: "Drive Mad", img: "https://cdn.shst.at/images/games/drive-mad.png", url: "https://kkgames.github.io/drive-mad/" },
            { name: "Egg Car", img: "https://play-lh.googleusercontent.com/I6PZpT0x", url: "https://kkgames.github.io/egg-car/" },
            { name: "Retro Bowl", img: "https://play-lh.googleusercontent.com/TM_fGfS", url: "https://kkgames.github.io/retro-bowl/" },
            { name: "Local Game", img: "https://via.placeholder.com/150/ff0000/000000?text=HTML+GAME", url: "game.html" }
        ];

        const grid = document.getElementById('game-grid');

        function render(list) {
            grid.innerHTML = '';
            list.forEach(game => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${game.img}"><p>${game.name}</p>`;
                card.onclick = () => {
                    document.getElementById('home-view').style.display = 'none';
                    document.getElementById('game-screen').style.display = 'flex';
                    document.getElementById('game-frame').src = game.url;
                    document.getElementById('game-title').innerText = game.name;
                };
                grid.appendChild(card);
            });
        }

        function filter() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = games.filter(g => g.name.toLowerCase().includes(query));
            render(filtered);
        }

        function closeGame() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }

        render(games);
    </script>
</body>
</html>
