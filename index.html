<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING'S DOMAIN | UNBLOCKED</title>
    <!-- Icons and Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           MASTER SETTINGS - CHANGE YOUR LINKS HERE
           ============================================================ */
        :root {
            /* 1. THE MAIN BACKGROUND IMAGE */
            --Wallpaper-URL: url('https://i.pinimg.com/1200x/0a/a1/2f/0aa12fe584207ff1ece5051ce5a5fea1.jpg');

            /* 2. THE WELCOME BANNER IMAGE */
            --Banner-URL: url('https://images8.alphacoders.com/132/1325171.jpeg');

            /* 3. THE COLORS */
            --p5-pink-red: #ff1f44;
            --p5-black: #000000;
            --p5-dark-grey: #141414;
        }

        /* ============================================================
           DESIGN CODE (Don't change this unless you want to re-design)
           ============================================================ */
        body {
            margin: 0;
            background-color: var(--p5-black);
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), var(--Wallpaper-URL);
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 60px;
            background: #000;
            border-bottom: 2px solid var(--p5-pink-red);
        }
        .logo { color: var(--p5-pink-red); font-weight: 900; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        .nav-right { font-size: 13px; color: white; opacity: 0.8; }

        /* Container */
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 60px; }

        /* Welcome Banner */
        .hero-banner {
            width: 100%;
            height: 320px;
            border-radius: 20px; 
            background: linear-gradient(to right, rgba(0,0,0,1) 40%, transparent), var(--Banner-URL);
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 60px;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 25px;
        }
        .hero-banner h1 { font-size: 44px; margin: 0; font-weight: 800; text-transform: uppercase; }
        .hero-banner p { font-size: 15px; color: #999; margin-top: 10px; }

        /* Search Bar */
        #gameSearch {
            width: 100%;
            padding: 15px 25px;
            background: var(--p5-dark-grey); 
            border: 1px solid #222;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 30px;
        }
        #gameSearch:focus { border-color: var(--p5-pink-red); }

        /* Grid & Vertical Rectangle Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 20px;
        }
        .card {
            background: var(--p5-dark-grey); 
            border-radius: 12px;
            height: 360px; /* Exact tall proportions */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #1a1a1a;
            cursor: pointer;
            transition: 0.2s ease;
            overflow: hidden;
            text-decoration: none;
        }
        .card:hover {
            border-color: var(--p5-pink-red);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(255, 31, 68, 0.3);
        }
        .card-img-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .card img { width: 60px; height: auto; } /* Small icons like image */
        .card p {
            width: 100%;
            background: #111;
            margin: 0;
            padding: 20px 0;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: white;
            border-top: 1px solid #1a1a1a;
        }

        /* Footer */
        footer {
            background: #000;
            padding: 40px 60px;
            border-top: 2px solid var(--p5-pink-red);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .social-links { display: flex; gap: 30px; }
        .social-links a { color: white; font-size: 26px; transition: 0.3s; text-decoration: none; }
        .social-links a:hover { color: var(--p5-pink-red); transform: scale(1.2); }

        /* Game Player View */
        #player-view {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 10000;
            flex-direction: column;
        }
        .back-bar {
            padding: 12px 40px;
            background: #000;
            border-bottom: 2px solid var(--p5-pink-red);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            background: var(--p5-pink-red);
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }
        iframe { flex-grow: 1; border: none; background: white; }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <div class="logo">KING'S DOMAIN</div>
        <div class="nav-right">Unblocked Games</div>
    </nav>

    <div id="home-view" class="container">
        <!-- BANNER -->
        <header class="hero-banner">
            <h1>WELCOME BACK</h1>
            <p>The best unblocked games, updated daily.</p>
        </header>

        <!-- SEARCH -->
        <input type="text" id="gameSearch" placeholder="Search for games..." onkeyup="filter()">

        <!-- GAME GRID -->
        <div class="grid" id="gameGrid"></div>
    </div>

    <!-- FOOTER -->
    <footer>
        <div class="social-links">
            <a href="https://discord.gg/yourlink" target="_blank"><i class="fab fa-discord"></i></a>
            <a href="https://youtube.com/yourlink" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://facebook.com/yourlink" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="https://x.com/yourlink" target="_blank"><i class="fab fa-x-twitter"></i></a>
        </div>
        <div style="font-size: 10px; color: #444; letter-spacing: 2px;">© 2024 KING'S DOMAIN</div>
    </footer>

    <!-- PLAYER VIEW -->
    <div id="player-view">
        <div class="back-bar">
            <button class="btn" onclick="closeGame()">← BACK</button>
            <span id="playing-title" style="font-weight:bold; letter-spacing: 1px;">GAME</span>
            <button class="btn" onclick="goFull()">FULLSCREEN</button>
        </div>
        <iframe id="gameFrame" src="" allowfullscreen></iframe>
    </div>

    <script> 
        
        const games = [
            
            { name: "Slime Rancher", img: "https://files.catbox.moe/1360id.png", url: "slimerancher.html" },
            
            { name: "slope", img: "https://sm.ign.com/ign_es/cover/s/slime-ranc/slime-rancher_j318.jpg", url: "slope.com" },
            
            { name: "1v1.LOL", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRzY3zN8N_X1Nf5YpPZ5o8E9h-pL-lqS-mEig&s", url: "https://1v1.lol" },
            
            { name: "BitLife", img: "https://play-lh.googleusercontent.com/H_f-R6U9p6M7L9f5B_R_3E5b6q9Z5F6", url: "https://bitlifeonline.io" },
            
            { name: "Tunnel Rush", img: "https://edumaps.net/wp-content/uploads/2022/12/tunnel-rush.png", url: "https://kkgames.github.io/tunnel-rush/" },
            
            { name: "Drive Mad", img: "https://cdn.shst.at/images/games/drive-mad.png", url: "https://kkgames.github.io/drive-mad/" }
        ];

        const grid = document.getElementById('gameGrid');
        const frame = document.getElementById('gameFrame');

        function render(data) {
            grid.innerHTML = '';
            data.forEach(game => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div class="card-img-wrapper"><img src="${game.img}"></div><p>${game.name}</p>`;
                card.onclick = () => {
                    document.getElementById('home-view').style.display = 'none';
                    document.getElementById('player-view').style.display = 'flex';
                    frame.src = game.url;
                    document.getElementById('playing-title').innerText = game.name;
                    window.scrollTo(0,0);
                };
                grid.appendChild(card);
            });
        }

        function filter() {
            const val = document.getElementById('gameSearch').value.toLowerCase();
            const f = games.filter(g => g.name.toLowerCase().includes(val));
            render(f);
        }

        function closeGame() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('player-view').style.display = 'none';
            frame.src = '';
        }

        function goFull() {
            if (frame.requestFullscreen) frame.requestFullscreen();
            else if (frame.webkitRequestFullscreen) frame.webkitRequestFullscreen();
        }

        render(games);
    </script>
</body>
</html>
