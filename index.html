<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King's Domain | Unblocked Games</title>
    <style>
        /* 1. THE LOOK (CSS) */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #0a0a0a;
            color: white;
            overflow-x: hidden;
        }

        /* Navigation Bar */
        .navbar {
            background: #000;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #ff4757;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { 
            font-size: 24px; 
            font-weight: bold; 
            color: #ff4757; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }

        /* THE BANNER (HERO SECTION) */
        .hero-banner {
            width: 100%;
            height: 400px;
            /* CHANGE BANNER IMAGE HERE */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=2070');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .hero-banner h1 { font-size: 60px; margin: 0; text-shadow: 0 0 20px #ff4757; }
        .hero-banner p { font-size: 20px; color: #ccc; margin-top: 10px; }

        /* HOME VIEW - Where the grid lives */
        #home-view { display: block; }

        .container { padding: 40px 5%; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* GAME CARDS */
        .game-card {
            background: #161616;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid #222;
        }
        .game-card:hover {
            transform: translateY(-5px);
            border-color: #ff4757;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.4);
        }
        .game-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            display: block;
        }
        .game-card p {
            text-align: center;
            padding: 12px;
            margin: 0;
            font-weight: bold;
        }

        /* PLAYER VIEW - Where the iframe lives */
        #player-view {
            display: none; /* Hidden at start */
            width: 100%;
            height: 95vh;
            flex-direction: column;
            align-items: center;
            background: #000;
        }
        .controls {
            width: 100%;
            padding: 10px 5%;
            background: #111;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
        }
        .back-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        iframe {
            width: 90%;
            height: 80%;
            margin-top: 20px;
            border: 2px solid #333;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo" onclick="goHome()">KING'S DOMAIN</div>
    </div>

    <!-- HOME VIEW (Banner + Grid) -->
    <div id="home-view">
        <div class="hero-banner">
            <h1>KING'S DOMAIN</h1>
            <p>The Ultimate Collection of Unblocked Games</p>
        </div>

        <div class="container">
            <h2 style="border-left: 5px solid #ff4757; padding-left: 15px;">POPULAR GAMES</h2>
            <div class="grid" id="game-grid">
                <!-- JavaScript will put games here -->
            </div>
        </div>
    </div>

    <!-- PLAYER VIEW (Hidden by default) -->
    <div id="player-view">
        <div class="controls">
            <button class="back-btn" onclick="goHome()">← BACK TO HOME</button>
            <h2 id="current-title" style="margin:0;">Game Title</h2>
            <div style="width:100px;"></div>
        </div>
        <iframe id="game-frame" src="" frameborder="0" allowfullscreen></iframe>
    </div>

    <script>
        // 2. THE DATA (GAMES)
        // Add your links from King's Domain here
        const games = [
            {
                title: "Slope",
                image: "https://classroom-6x.lol/_next/image?url=https%3A%2F%2Fcdn.shst.at%2Fimages%2Fgames%2Fslope.png&w=128&q=75",
                url: "https://kkgames.github.io/slope/"
            },
            {
                title: "1v1.LOL",
                image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRzY3zN8N_X1Nf5YpPZ5o8E9h-pL-lqS-mEig&s",
                url: "https://1v1.lol"
            },
            {
                title: "Tunnel Rush",
                image: "https://edumaps.net/wp-content/uploads/2022/12/tunnel-rush.png",
                url: "https://kkgames.github.io/tunnel-rush/"
            },
            {
                title: "Drive Mad",
                image: "https://cdn.shst.at/images/games/drive-mad.png",
                url: "https://kkgames.github.io/drive-mad/"
            }
        ];

        // 3. THE LOGIC (JAVASCRIPT)
        const homeView = document.getElementById('home-view');
        const playerView = document.getElementById('player-view');
        const gameFrame = document.getElementById('game-frame');
        const titleText = document.getElementById('current-title');
        const grid = document.getElementById('game-grid');

        // Load the games into the grid
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.innerHTML = `<img src="${game.image}"><p>${game.title}</p>`;
            card.onclick = () => {
                homeView.style.display = 'none';    // Hide Banner and Grid
                playerView.style.display = 'flex'; // Show Player
                gameFrame.src = game.url;          // Load game in iframe
                titleText.innerText = game.title;
                window.scrollTo(0,0);
            };
            grid.appendChild(card);
        });

        // Function to go back
        function goHome() {
            homeView.style.display = 'block';
            playerView.style.display = 'none';
            gameFrame.src = ""; // Stops game sound
        }
    </script>
</body>
</html>
