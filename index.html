<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King's Domain | Unblocked</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --p5-pink-red: #ff1f44;
            --p5-black: #000000;
            --p5-card-bg: #121212;
        }

        body {
            margin: 0;
            background-color: var(--p5-black);
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                              url('https://wallpapers.com/images/hd/persona-5-background-030o8u3u29n532no.jpg');
            background-size: cover;
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Nav */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 80px; 
            background: rgba(0, 0, 0, 0.95);
            border-bottom: 2px solid var(--p5-pink-red);
        }

        .logo { color: var(--p5-pink-red); font-weight: 800; font-size: 22px; text-transform: uppercase; }

        /* Main Container */
        .container { max-width: 1250px; margin: 0 auto; padding: 40px 80px; }

        .hero-banner {
            width: 100%;
            height: 320px;
            border-radius: 20px; 
            background: linear-gradient(to right, rgba(0,0,0,1) 40%, transparent), 
                        url('https://images8.alphacoders.com/132/1325171.jpeg');
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 60px;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }

        #gameSearch {
            width: 100%;
            padding: 15px 25px;
            background: #141414; 
            border: 1px solid #252525;
            border-radius: 8px;
            color: white;
            margin-bottom: 35px;
            outline: none;
        }

        /* Grid & Tall Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 20px;
        }

        .card {
            background: var(--p5-card-bg); 
            border-radius: 12px;
            height: 350px; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #1a1a1a;
            cursor: pointer;
            transition: all 0.2s ease;
            overflow: hidden;
        }

        .card:hover { border-color: var(--p5-pink-red); transform: translateY(-5px); }

        .card-img-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        /* This controls how the icon looks */
        .card img {
            max-width: 80px;  /* Increase this number to make icons bigger */
            max-height: 80px;
            width: auto;
            height: auto;
            object-fit: contain; /* Keeps icon from stretching */
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }

        .card p {
            width: 100%;
            background: var(--p5-card-bg);
            margin: 0;
            padding: 20px 0;
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            border-top: 1px solid #1a1a1a;
        }

        /* Player View */
        #player-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 10000; flex-direction: column; }
        .back-bar { padding: 15px 40px; background: #000; border-bottom: 2px solid var(--p5-pink-red); }
        .back-btn { background: var(--p5-pink-red); color: white; border: none; padding: 10px 25px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        iframe { flex-grow: 1; border: none; }

        footer { background: rgba(0, 0, 0, 0.95); padding: 40px 80px; border-top: 2px solid var(--p5-pink-red); display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .social-links { display: flex; gap: 30px; }
        .social-links a { color: white; font-size: 28px; text-decoration: none; transition: 0.3s; }
        .social-links a:hover { color: var(--p5-pink-red); transform: scale(1.2); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">KING'S DOMAIN</div>
        <div style="font-size: 14px; opacity: 0.8;">Unblocked Games</div>
    </nav>

    <div id="home-screen" class="container">
        <header class="hero-banner">
            <h1 style="font-size: 48px; margin:0;">WELCOME BACK</h1>
            <p style="font-size: 16px; color: #ccc;">The best unblocked games, updated daily.</p>
        </header>

        <input type="text" id="gameSearch" placeholder="Search for games..." onkeyup="filter()">

        <div class="grid" id="gameGrid"></div>
    </div>

    <footer>
        <div class="social-links">
            <a href="#"><i class="fab fa-discord"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-x-twitter"></i></a>
        </div>
        <div style="font-size: 11px; opacity: 0.5; letter-spacing: 2px; margin-top: 10px;">© 2024 KING'S DOMAIN</div>
    </footer>

    <div id="player-view">
        <div class="back-bar"><button class="back-btn" onclick="closeGame()">← BACK TO HOME</button></div>
        <iframe id="gameFrame" src=""></iframe>
    </div>

    <script>
        // ==========================================
        // === EDIT YOUR GAMES AND ICONS HERE ===
        // ==========================================
        const games = [
            { 
                name: "Slope", 
                img: "https://classroom-6x.lol/_next/image?url=https%3A%2F%2Fcdn.shst.at%2Fimages%2Fgames%2Fslope.png&w=128&q=75", 
                url: "https://kkgames.github.io/slope/" 
            },
            { 
                name: "1v1.LOL", 
                img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRzY3zN8N_X1Nf5YpPZ5o8E9h-pL-lqS-mEig&s", 
                url: "https://1v1.lol" 
            },
            { 
                name: "BitLife", 
                img: "https://play-lh.googleusercontent.com/H_f-R6U9p6M7L9f5B_R_3E5b6q9Z5F6", 
                url: "https://bitlifeonline.io" 
            },
            { 
                name: "Tunnel Rush", 
                img: "https://edumaps.net/wp-content/uploads/2022/12/tunnel-rush.png", 
                url: "https://kkgames.github.io/tunnel-rush/" 
            },
            { 
                name: "Drive Mad", 
                img: "https://cdn.shst.at/images/games/drive-mad.png", 
                url: "https://kkgames.github.io/drive-mad/" 
            }
        ];
        // ==========================================

        const grid = document.getElementById('gameGrid');
        function render(data) {
            grid.innerHTML = '';
            data.forEach(game => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-img-wrapper">
                        <img src="${game.img}" alt="${game.name}">
                    </div>
                    <p>${game.name}</p>
                `;
                card.onclick = () => {
                    document.getElementById('home-screen').style.display = 'none';
                    document.getElementById('player-view').style.display = 'flex';
                    document.getElementById('gameFrame').src = game.url;
                    window.scrollTo(0,0);
                };
                grid.appendChild(card);
            });
        }
        function filter() {
            const val = document.getElementById('gameSearch').value.toLowerCase();
            const f = games.filter(g => g.name.toLowerCase().includes(val));
            render(f);
        }
        function closeGame() {
            document.getElementById('home-screen').style.display = 'block';
            document.getElementById('player-view').style.display = 'none';
            document.getElementById('gameFrame').src = '';
        }
        render(games);
    </script>
</body>
</html>
