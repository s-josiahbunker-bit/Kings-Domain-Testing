<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King's Domain | Unblocked</title>
    <style>
        /* CSS STYLES */
        :root {
            --primary: #ff4757;
            --bg-dark: #0a0a0a;
            --card-bg: #161616;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            /* IMAGE DESIGN: This sets a background image for the whole site */
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                              url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-attachment: fixed;
            background-size: cover;
        }

        /* Navbar Design */
        nav {
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Hero Banner Image */
        .hero {
            width: 90%;
            max-width: 1200px;
            height: 300px;
            margin: 20px auto;
            border-radius: 15px;
            /* IMAGE DESIGN: The big banner at the top */
            background: linear-gradient(to right, rgba(0,0,0,0.9), transparent), 
                        url('https://images.unsplash.com/photo-1542751371-adc38448a05e?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            padding: 40px;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .hero-text h1 { font-size: 40px; margin: 0; }
        .hero-text p { color: #ccc; margin-top: 10px; }

        /* Game Grid Design */
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 50px;
        }

        .search-box {
            width: 100%;
            padding: 15px;
            margin-bottom: 30px;
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        /* Image Card Design */
        .game-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            border: 1px solid #222;
            display: block;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.3);
        }

        .game-card img {
            width: 100%;
            aspect-ratio: 1/1; /* Makes them perfect squares */
            object-fit: cover; /* Prevents stretching */
            display: block;
        }

        .game-card p {
            padding: 12px;
            margin: 0;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
        }

    </style>
</head>
<body>

    <nav>
        <div class="logo">KING'S DOMAIN</div>
        <div>Unblocked Games</div>
    </nav>

    <header class="hero">
        <div class="hero-text">
            <h1>WELCOME BACK</h1>
            <p>The best unblocked games, updated daily.</p>
        </div>
    </header>

    <div class="container">
        <input type="text" class="search-box" id="search" placeholder="Search for games..." onkeyup="filterGames()">
        
        <div class="grid" id="gameGrid">
            <!-- JavaScript will put games here -->
        </div>
    </div>

    <script>
        // JAVASCRIPT LOGIC
        // Replace these URLs with the ones you copy from King's Domain
        const games = [
            {
                title: "Slope",
                image: "https://classroom-6x.lol/_next/image?url=https%3A%2F%2Fcdn.shst.at%2Fimages%2Fgames%2Fslope.png&w=128&q=75",
                url: "https://kkgames.github.io/slope/"
            },
            {
                title: "1v1.LOL",
                image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRzY3zN8N_X1Nf5YpPZ5o8E9h-pL-lqS-mEig&s",
                url: "https://1v1.lol"
            },
            {
                title: "BitLife",
                image: "https://play-lh.googleusercontent.com/H_f-R6U9p6M7L9f5B_R_3E5b6q9Z5F6",
                url: "https://bitlifeonline.io"
            },
            {
                title: "Tunnel Rush",
                image: "https://edumaps.net/wp-content/uploads/2022/12/tunnel-rush.png",
                url: "https://kkgames.github.io/tunnel-rush/"
            },
            {
                title: "Drive Mad",
                image: "https://cdn.shst.at/images/games/drive-mad.png",
                url: "https://kkgames.github.io/drive-mad/"
            }
        ];

        const homePage = document.getElementById('home-page');
        const playerPage = document.getElementById('player-page');
        const iframe = document.getElementById('game-iframe');
        const titleText = document.getElementById('current-title');
        const grid = document.getElementById('game-grid');

        // Create the grid of games
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.innerHTML = `
                <img src="${game.image}">
                <p>${game.title}</p>
            `;
            card.onclick = () => playMovie(game.url, game.title);
            grid.appendChild(card);
        });

        // FUNCTION TO LOAD THE GAME
        function playMovie(url, title) {
            homePage.style.display = 'none';    // Hide the grid
            playerPage.style.display = 'flex'; // Show the player
            iframe.src = url;                 // Put game link in iframe
            titleText.innerText = title;      // Set title
        }

        // FUNCTION TO GO BACK
        function goHome() {
            homePage.style.display = 'block'; // Show the grid
            playerPage.style.display = 'none'; // Hide the player
            iframe.src = "";                  // Unload the game (stops sound)
        }

        // FULLSCREEN FUNCTION
        function toggleFull() {
            if (iframe.requestFullscreen) {
                iframe.requestFullscreen();
            } else if (iframe.webkitRequestFullscreen) {
                iframe.webkitRequestFullscreen();
            }
        }
    </script>
</body>
</html>

<div class="navbar">
        <div class="logo" onclick="goHome()">KING'S DOMAIN</div>
    </div>

    <!-- PAGE 1: HOME GRID -->
    <div id="home-page">
        <div class="grid" id="game-grid">
            <!-- Games are generated here -->
        </div>
    </div>

    <!-- PAGE 2: GAME PLAYER -->
    <div id="player-page">
        <div class="controls">
            <button class="btn" onclick="goHome()">← BACK</button>
            <h2 id="current-title" style="margin:0;">Game Title</h2>
            <button class="btn" onclick="toggleFull()">FULLSCREEN</button>
        </div>
        <iframe id="game-iframe" src="" allowfullscreen></iframe>
    </div>
