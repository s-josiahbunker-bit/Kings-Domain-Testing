<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING'S DOMAIN | V17</title>
    
    <!-- Tab Icon -->
    <link rel="icon" type="image/png" href="https://i.ibb.co/vYm6vS6/Take-Your-Heart.png">
    
    <!-- External Assets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           1. MASTER ART SETTINGS (Change links here)
           ============================================================ */
        :root {
            /* PAGE WALLPAPERS */
            --Home-Wallpaper: url('https://wallpapers.com/images/hd/persona-5-background-030o8u3u29n532no.jpg');
            --Movie-Wallpaper: url('https://wallpaperaccess.com/full/1531383.jpg');
            --Show-Wallpaper: url('https://wallpapercave.com/wp/wp4047814.jpg');
            --Anime-Wallpaper: url('https://images8.alphacoders.com/132/1325171.jpeg');
            --Proxy-Wallpaper: url('https://images.alphacoders.com/836/836569.png');

            /* SIDEBAR WALLPAPER (NEW) */
            --Sidebar-Wallpaper: url('https://images.alphacoders.com/691/691456.jpg');

            /* UI IMAGES */
            --Banner-Art: url('https://images8.alphacoders.com/132/1325171.jpeg');
            --Menu-Img: url('https://i.ibb.co/68v8T3G/p5-menu.jpg'); 
            
            /* COLORS */
            --p5-pink-red: #ff1f44; 
            --p5-black: #000000;
            --p5-card-bg: #141414;
        }

        /* ============================================================
           2. CORE DESIGN
           ============================================================ */
        body, html { margin: 0; padding: 0; height: 100%; background-color: var(--p5-black); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        #bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), var(--Home-Wallpaper); 
            background-size: cover; background-attachment: fixed; background-position: center;
            z-index: -1; transition: background-image 0.6s ease;
        }

        /* VERTICAL NAV */
        .v-nav {
            position: fixed; left: 0; top: 0; height: 100%; width: 85px; 
            background: #000; border-right: 2px solid var(--p5-pink-red);
            display: flex; flex-direction: column; align-items: center; 
            padding-top: 20px; z-index: 1000;
        }
        .nav-btn { width: 65px; height: 65px; background-image: var(--Menu-Img); background-size: contain; background-repeat: no-repeat; background-position: center; cursor: pointer; transition: 0.3s; mix-blend-mode: screen; }
        .nav-btn:hover { transform: scale(1.2); filter: drop-shadow(0 0 15px var(--p5-pink-red)); }

        /* SIDEBAR (IMAGE BACKGROUND) */
        #sidebar {
            position: fixed; top: 0; left: -320px; width: 310px; height: 100%;
            /* Applies Sidebar Image with a dark overlay to keep text readable */
            background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), var(--Sidebar-Wallpaper);
            background-size: cover; background-position: center;
            border-right: 4px solid var(--p5-pink-red);
            z-index: 2001; transition: 0.5s ease; padding: 50px 20px; box-sizing: border-box;
        }
        #sidebar.active { left: 0; }
        .sidebar-header { color: var(--p5-pink-red); font-weight: 900; font-size: 24px; text-transform: uppercase; margin-bottom: 20px; border-bottom: 2px solid #222; padding-bottom: 10px; }
        .sidebar-item { display: flex; align-items: center; gap: 15px; padding: 18px; color: white; text-decoration: none; font-weight: 900; font-size: 20px; text-transform: uppercase; transition: 0.3s; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar-item:hover { color: var(--p5-pink-red); padding-left: 30px; background: rgba(255, 31, 68, 0.15); }

        /* WORKSPACE */
        .top-bar { margin-left: 85px; padding: 15px 50px; background: rgba(0,0,0,0.5); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo-text { color: var(--p5-pink-red); font-weight: 900; font-size: 20px; text-transform: uppercase; letter-spacing: 2px; }
        
        .workspace { margin-left: 85px; height: calc(100% - 60px); width: calc(100% - 85px); overflow-y: auto; box-sizing: border-box; position: relative; scroll-behavior: smooth; }
        .container { padding: 40px 60px; max-width: 1400px; margin: 0 auto; }
        
        .hero-banner { width: 100%; height: 280px; border-radius: 20px; margin-bottom: 30px; background: linear-gradient(to right, rgba(0,0,0,1) 40%, transparent), var(--Banner-Art); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; padding-left: 60px; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.1); }
        .hero-banner h1 { font-size: 44px; margin: 0; font-weight: 900; text-transform: uppercase; }

        #searchBox { width: 100%; padding: 18px 25px; background: var(--p5-card-bg); border: 1px solid #222; border-radius: 8px; color: white; margin-bottom: 30px; outline: none; font-size: 16px; }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: var(--p5-card-bg); border-radius: 12px; height: 380px; position: relative; overflow: hidden; border: 1px solid #1a1a1a; cursor: pointer; transition: 0.3s; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card p { position: absolute; bottom: 0; width: 100%; background: rgba(0, 0, 0, 0.85); margin: 0; padding: 12px 0; text-align: center; font-size: 11px; font-weight: 700; border-top: 1px solid var(--p5-pink-red); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* PROXY UI */
        #proxy-page { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; text-align: center; }
        .proxy-title { color: white; font-size: 60px; font-weight: 900; text-transform: uppercase; margin-bottom: 25px; text-shadow: 4px 4px 0px var(--p5-pink-red); transform: skewX(-5deg); }
        .proxy-input { width: 90%; max-width: 650px; padding: 25px; font-size: 22px; background: #000; border: 4px solid white; color: white; transform: skewX(-10deg); outline: none; box-shadow: 12px 12px 0px var(--p5-pink-red); font-weight: 900; text-transform: uppercase; }

        /* PLAYER */
        #player-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 10000; flex-direction: column; }
        .player-bar { height: 60px; padding: 0 40px; background: #000; border-bottom: 2px solid var(--p5-pink-red); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        #gameFrame { width: 100%; height: calc(100% - 60px); border: none; background: #000; }
        .p-btn { background: var(--p5-pink-red); color: white; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .loader { grid-column: 1/-1; text-align: center; padding: 20px; color: var(--p5-pink-red); font-weight: 900; }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <nav class="v-nav"><div class="nav-btn" title="Open Menu" onclick="toggleSidebar()"></div></nav>

    <!-- SIDEBAR -->
    <div id="sidebar" onmouseleave="closeSidebar()">
        <div style="text-align:center; margin-bottom:30px;"><img src="https://i.ibb.co/vYm6vS6/Take-Your-Heart.png" style="width:120px;"></div>
        <div class="sidebar-header">DESTINATIONS</div>
        <div class="sidebar-item" onclick="changeHub('home')"><i class="fas fa-home"></i> Home</div>
        <div class="sidebar-item" onclick="changeHub('movie')"><i class="fas fa-film"></i> Movies</div>
        <div class="sidebar-item" onclick="changeHub('tv')"><i class="fas fa-tv"></i> Shows</div>
        <div class="sidebar-item" onclick="changeHub('anime')"><i class="fas fa-dragon"></i> Anime</div>
        <div class="sidebar-item" onclick="openProxy()"><i class="fas fa-mask"></i> Proxy</div>
    </div>

    <div class="top-bar">
        <div class="logo-text">KING'S DOMAIN</div>
        <div style="font-size: 11px; opacity: 0.5;">HUB_V17_FULLY_ARMED</div>
    </div>

    <div class="workspace" id="workspace">
        <div id="grid-content" class="container">
            <header class="hero-banner">
                <h1 id="banner-text">WELCOME BACK</h1>
                <p id="banner-sub">Targets acquired. Scroll to browse infinite targets.</p>
            </header>
            <input type="text" id="searchBox" placeholder="Filter targets..." onkeyup="filterSearch()">
            <div class="grid" id="mainGrid"></div>
            <div id="infinite-loader" class="loader" style="display:none;">HACKING MORE CONTENT...</div>
        </div>

        <div id="proxy-page">
            <h1 class="proxy-title">Phantom Proxy</h1>
            <input type="text" id="proxyInput" class="proxy-input" placeholder="Enter URL or Search..." onkeydown="if(event.key==='Enter') startProxy()">
        </div>
    </div>

    <div id="player-view">
        <div class="player-bar">
            <button class="p-btn" onclick="closePlayer()">← BACK</button>
            <span id="playing-title" style="font-weight:900; text-transform:uppercase;">DESTINATION</span>
            <button class="p-btn" onclick="goFull()">FULLSCREEN</button>
        </div>
        <iframe id="gameFrame" src="" allowfullscreen></iframe>
    </div>

    <script>
        // ==========================================
        // 3. SETTINGS & LOGIC
        // ==========================================
        const TMDB_KEY = "cce36626c4c9d64a54c0731adcaa1d8f"; 
        const PROXY_ENGINE = "https://t0.t0.t0.t0.t0.t0.t0.t0.t0.t0.t0.t0.t0.t0.t0.t0.t0.t0.t0.t0.t0.t0.rammerhead.org/";
        
        let currentMode = "home";
        let apiData = [];
        let currentPage = 1;
        let isFetching = false;

        const games = [
            { name: "Slime Rancher", img: "https://sm.ign.com/ign_es/cover/s/slime-ranc/slime-rancher_j318.jpg", url: "slimerancher.html" },
            { name: "Helltaker", img: "https://files.catbox.moe/k9d5o6.png", url: "helltaker.html" },
            { name: "Tuff Client", img: "https://files.catbox.moe/rbt7f1.png", url: "tuffclient.html" },
            { name: "Slope", img: "https://sm.ign.com/ign_br/game/s/slope/slope_69qy.jpg", url: "https://kkgames.github.io/slope/" },
            { name: "1v1.LOL", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRzY3zN8N_X1Nf5YpPZ5o8E9h-pL-lqS-mEig&s", url: "https://1v1.lol" }
        ];

        const mainGrid = document.getElementById('mainGrid');
        const frame = document.getElementById('gameFrame');
        const bgLayer = document.getElementById('bg-layer');
        const workspace = document.getElementById('workspace');

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('active'); }

        async function changeHub(mode) {
            currentMode = mode; currentPage = 1; apiData = []; closeSidebar();
            document.getElementById('grid-content').style.display = 'block';
            document.getElementById('proxy-page').style.display = 'none';
            mainGrid.innerHTML = '';

            if(mode === 'home') {
                bgLayer.style.backgroundImage = "linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), var(--Home-Wallpaper)";
                document.getElementById('banner-text').innerText = "WELCOME BACK";
                render(games);
            } else {
                let wall = (mode === 'tv') ? 'var(--Show-Wallpaper)' : (mode === 'anime' ? 'var(--Anime-Wallpaper)' : 'var(--Movie-Wallpaper)');
                bgLayer.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), ${wall}`;
                document.getElementById('banner-text').innerText = mode.toUpperCase() + " HUB";
                await fetchMore();
            }
        }

        async function fetchMore() {
            if (isFetching || currentMode === 'home') return;
            isFetching = true;
            document.getElementById('infinite-loader').style.display = 'block';

            let type = (currentMode === 'anime') ? 'tv' : currentMode;
            let url = `https://api.themoviedb.org/3/trending/${type}/day?api_key=${TMDB_KEY}&page=${currentPage}`;
            if (currentMode === 'anime') url = `https://api.themoviedb.org/3/discover/tv?api_key=${TMDB_KEY}&with_genres=16&with_original_language=ja&sort_by=popularity.desc&page=${currentPage}`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                const newItems = data.results.map(i => ({
                    name: i.title || i.name,
                    img: i.poster_path ? `https://image.tmdb.org/t/p/w500${i.poster_path}` : 'https://via.placeholder.com/500x750?text=No+Poster',
                    url: (currentMode === 'movie' || i.media_type === 'movie') ? `https://vidsrc.xyz/embed/movie?tmdb=${i.id}` : `https://vidsrc.xyz/embed/tv?tmdb=${i.id}&season=1&episode=1`
                }));
                apiData = [...apiData, ...newItems];
                render(apiData);
                currentPage++;
            } catch(e) {}
            isFetching = false;
            document.getElementById('infinite-loader').style.display = 'none';
        }

        workspace.addEventListener('scroll', () => {
            if (workspace.scrollTop + workspace.clientHeight >= workspace.scrollHeight - 1000) fetchMore();
        });

        function render(data) {
            if (currentPage === 1) mainGrid.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${item.img}"><p>${item.name}</p>`;
                card.onclick = () => {
                    document.getElementById('player-view').style.display = 'flex';
                    frame.src = item.url;
                    document.getElementById('playing-title').innerText = item.name;
                };
                mainGrid.appendChild(card);
            });
        }

        function openProxy() { closeSidebar(); document.getElementById('grid-content').style.display = 'none'; document.getElementById('proxy-page').style.display = 'flex'; bgLayer.style.backgroundImage = "linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), var(--Proxy-Wallpaper)"; }
        function startProxy() { document.getElementById('player-view').style.display = 'flex'; document.getElementById('gameFrame').src = PROXY_ENGINE; }
        function closePlayer() { document.getElementById('player-view').style.display = 'none'; frame.src = ''; }
        function filterSearch() { const val = document.getElementById('searchBox').value.toLowerCase(); const data = (currentMode === 'home' ? games : apiData); mainGrid.innerHTML = ''; render(data.filter(i => i.name.toLowerCase().includes(val))); }
        function goFull() { const f = document.getElementById('gameFrame'); if (f.requestFullscreen) f.requestFullscreen(); else if (f.webkitRequestFullscreen) f.webkitRequestFullscreen(); }

        render(games);
    </script>
</body>
</html>352
