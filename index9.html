<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KING'S DOMAIN | SHADOW V80</title>
    <!-- Paste your original CSS style block here -->
    <style>
        :root { --p5-pink-red: #ff1f44; --p5-black: #000; }
        body { background: var(--p5-black); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        .v-nav { position:fixed; left:0; top:0; width:85px; height:100%; border-right:2px solid var(--p5-pink-red); background:#000; z-index:1000; }
        #sidebar { position:fixed; top:0; left:-320px; width:310px; height:100%; background:#111; border-right:4px solid var(--p5-pink-red); z-index:2001; transition:0.5s; padding:50px; }
        #sidebar.active { left:0; }
        .workspace { margin-left:85px; height:100vh; overflow-y:auto; padding:40px; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:20px; }
        .card { background:#141414; border-radius:12px; height:380px; border:1px solid #1a1a1a; cursor:pointer; }
        .card img { width:100%; height:85%; object-fit:cover; }
        #player-view { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:9999; flex-direction:column; }
        .ep-grid { display:grid; grid-template-columns:repeat(5, 1fr); gap:5px; margin-top:10px; width:300px; }
        .ep-btn { background:#222; border:none; color:#fff; padding:10px; cursor:pointer; }
        .ep-btn.active { background:var(--p5-pink-red); }
        .sv-node { padding:10px; background:#222; margin:5px; cursor:pointer; border:1px solid #444; }
        .sv-node.active { border-color:var(--p5-pink-red); }
    </style>
</head>
<body>
    <nav class="v-nav"><div class="nav-btn" style="width:50px;height:50px;background:white;cursor:pointer;" onclick="document.getElementById('sidebar').classList.toggle('active')"></div></nav>
    <div id="sidebar">
        <div class="sidebar-item" onclick="changeHub('arcade')">ARCADE</div>
        <div class="sidebar-item" onclick="changeHub('movie')">MOVIES</div>
        <div class="sidebar-item" onclick="changeHub('tv')">TV SHOWS</div>
        <div class="sidebar-item" onclick="changeHub('anime')">ANIME</div>
    </div>
    <div class="workspace" id="workspace">
        <div class="grid" id="mainGrid"></div>
    </div>

    <div id="player-view">
        <div style="padding:20px;">
            <button onclick="document.getElementById('player-view').style.display='none'">BACK</button>
            <div id="controls" style="display:none;">
                <div id="serverHub"></div>
                <select id="seasonSelect" onchange="buildEpisodes()"></select>
                <div id="epGrid" class="ep-grid"></div>
            </div>
        </div>
        <iframe id="gameFrame" src="" style="width:100%; height:100vh; border:none;"></iframe>
    </div>

    <script>
        let TMDB_KEY = localStorage.getItem('tmdb_api_key') || prompt("Enter TMDB API Key:");
        let state = { id:"", mode:"", season:1, episode:1, provider:"node1", lang:"sub" };

        const NODES = {
            node1: { name:"VidSrc", url:"https://vidsrc.xyz/embed/" },
            node2: { name:"MultiEmbed", url:"https://multiembed.mov/?video_id=" }
        };

        // Infinite Scroll
        document.getElementById('workspace').onscroll = function() {
            if(this.scrollTop + this.clientHeight >= this.scrollHeight - 500) { /* Add pagination logic here */ }
        };

        async function changeHub(mode) {
            state.mode = mode;
            document.getElementById('sidebar').classList.remove('active');
            let url = mode === 'arcade' ? null : `https://api.themoviedb.org/3/discover/${mode === 'anime' ? 'tv' : mode}?api_key=${TMDB_KEY}${mode === 'anime' ? '&with_genres=16' : ''}`;
            if(mode === 'arcade') { /* Render games */ return; }
            const res = await fetch(url);
            const data = await res.json();
            render(data.results);
        }

        function render(results) {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            results.forEach(i => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${i.poster_path}"><p>${i.title || i.name}</p>`;
                card.onclick = () => openPlayer(i);
                grid.appendChild(card);
            });
        }

        async function openPlayer(item) {
            state.id = item.id;
            document.getElementById('player-view').style.display = 'flex';
            const isTV = (state.mode === 'tv' || state.mode === 'anime');
            document.getElementById('controls').style.display = isTV ? 'block' : 'none';
            
            if(isTV) {
                const res = await fetch(`https://api.themoviedb.org/3/tv/${item.id}?api_key=${TMDB_KEY}`);
                const data = await res.json();
                document.getElementById('seasonSelect').innerHTML = data.seasons.map(s => `<option value="${s.season_number}">Season ${s.season_number}</option>`).join('');
                buildEpisodes();
            } else {
                document.getElementById('gameFrame').src = `${NODES.node1}movie/${item.id}`;
            }
            buildServerButtons();
        }

        function buildEpisodes() {
            const sn = document.getElementById('seasonSelect').value;
            fetch(`https://api.themoviedb.org/3/tv/${state.id}/season/${sn}?api_key=${TMDB_KEY}`)
            .then(r => r.json()).then(d => {
                const grid = document.getElementById('epGrid');
                grid.innerHTML = '';
                d.episodes.forEach(ep => {
                    const b = document.createElement('button');
                    b.className = 'ep-btn';
                    b.innerText = ep.episode_number;
                    b.onclick = () => { state.episode = ep.episode_number; state.season = sn; refreshPlayer(); };
                    grid.appendChild(b);
                });
            });
        }

        function buildServerButtons() {
            const hub = document.getElementById('serverHub');
            hub.innerHTML = '';
            Object.keys(NODES).forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'sv-node ' + (state.provider === key ? 'active' : '');
                btn.innerText = NODES[key].name;
                btn.onclick = () => { state.provider = key; buildServerButtons(); refreshPlayer(); };
                hub.appendChild(btn);
            });
        }

        function refreshPlayer() {
            const l = (state.mode === 'anime' && state.lang === 'dub') ? '&dub=1' : '&sub=1';
            const url = state.provider === 'node1' 
                ? `${NODES.node1}${state.mode === 'movie' ? 'movie' : 'tv'}/${state.id}${state.mode === 'movie' ? '' : '/'+state.season+'/'+state.episode}${l}`
                : `${NODES.node2}${state.id}&s=${state.season}&e=${state.episode}`;
            document.getElementById('gameFrame').src = url;
        }
    </script>
</body>
</html>
